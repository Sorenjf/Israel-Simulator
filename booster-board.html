<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Israel Simulator - Online Monopoly</title>
<!-- WebSocket multiplayer (served by server.js) -->
<style>
/* ============ RESET & BASE ============ */
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Rajdhani', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a1a; color: #e0e0e0; overflow: hidden; height: 100vh; }

/* ============ LOBBY ============ */
#lobby {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; gap: 20px;
  background: radial-gradient(ellipse at 50% 0%, #1a1040 0%, #0d0d24 40%, #070714 100%);
  position: relative; overflow: hidden;
}
#lobby::before {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: conic-gradient(from 0deg at 50% 50%, transparent 0deg, rgba(233,69,96,0.03) 60deg, transparent 120deg, rgba(83,52,131,0.03) 180deg, transparent 240deg, rgba(233,69,96,0.03) 300deg, transparent 360deg);
  animation: rotateBg 30s linear infinite; pointer-events: none;
}
@keyframes rotateBg { to { transform: rotate(360deg); } }
#lobby h1 {
  font-family: 'Orbitron', sans-serif; font-size: 3.2em; font-weight: 900;
  background: linear-gradient(135deg, #e94560 0%, #ff6b81 40%, #e94560 60%, #c0392b 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: none; letter-spacing: 3px; position: relative; z-index: 1;
  filter: drop-shadow(0 0 30px rgba(233,69,96,0.4));
}
#lobby h2 {
  font-family: 'Rajdhani', sans-serif; font-size: 1.15em; color: #7a7a9a; margin-top: -10px;
  letter-spacing: 4px; text-transform: uppercase; font-weight: 400; position: relative; z-index: 1;
}
.lobby-box {
  background: linear-gradient(135deg, rgba(20,16,40,0.8) 0%, rgba(15,12,30,0.9) 100%);
  border: 1px solid rgba(233,69,96,0.15); backdrop-filter: blur(20px);
  border-radius: 20px; padding: 32px; width: 420px; text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  position: relative; z-index: 1;
}
.lobby-box h3 { margin-bottom: 15px; color: #e94560; font-family: 'Orbitron', sans-serif; font-size: 1em; letter-spacing: 1px; }
.lobby-input {
  width: 100%; padding: 14px 18px; border-radius: 12px; border: 1px solid rgba(233,69,96,0.2);
  background: rgba(255,255,255,0.04); color: #fff; font-size: 16px; margin-bottom: 10px;
  outline: none; transition: all 0.3s; font-family: 'Rajdhani', sans-serif;
}
.lobby-input:focus { border-color: #e94560; background: rgba(233,69,96,0.06); box-shadow: 0 0 20px rgba(233,69,96,0.15); }
.lobby-btn {
  padding: 14px 32px; border-radius: 12px; border: none; font-size: 16px; cursor: pointer;
  font-weight: 700; transition: all 0.3s; width: 100%; font-family: 'Rajdhani', sans-serif;
  letter-spacing: 1px; text-transform: uppercase; position: relative; overflow: hidden;
}
.lobby-btn::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition: left 0.5s;
}
.lobby-btn:hover::after { left: 100%; }
.btn-create { background: linear-gradient(135deg, #e94560 0%, #c0392b 100%); color: #fff; box-shadow: 0 4px 20px rgba(233,69,96,0.3); }
.btn-create:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(233,69,96,0.5); }
.btn-join { background: linear-gradient(135deg, #533483 0%, #3d2363 100%); color: #fff; box-shadow: 0 4px 20px rgba(83,52,131,0.3); }
.btn-join:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(83,52,131,0.5); }
.room-code-display {
  font-size: 2em; font-weight: bold; color: #e94560; background: rgba(233,69,96,0.1);
  padding: 10px 20px; border-radius: 8px; margin: 10px 0; letter-spacing: 4px;
  user-select: all; cursor: pointer;
}
.player-list { text-align: left; margin: 10px 0; }
.player-list div { padding: 6px 12px; margin: 4px 0; background: rgba(255,255,255,0.05); border-radius: 6px; }
.emoji-picker { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 10px 0; }
.emoji-opt {
  font-size: 1.8em; width: 48px; height: 48px; border-radius: 12px; border: 2px solid transparent;
  background: rgba(255,255,255,0.05); cursor: pointer; display: flex; align-items: center;
  justify-content: center; transition: all 0.2s;
}
.emoji-opt:hover { background: rgba(255,255,255,0.15); }
.emoji-opt.selected { border-color: #e94560; background: rgba(233,69,96,0.2); }
#lobby-status { color: #a0a0c0; font-size: 0.9em; }
.btn-start { background: #27ae60; color: #fff; margin-top: 10px; }
.btn-start:hover { background: #2ecc71; }
.btn-start:disabled { background: #555; cursor: not-allowed; }

/* ============ GAME CONTAINER ============ */
#game {
  display: none; height: 100vh; width: 100vw; position: relative; opacity: 0;
  background: radial-gradient(ellipse at 50% 50%, #12122a 0%, #0a0a1a 60%, #050510 100%);
}
#game::before {
  content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

/* Room code banner (top-right, shown during lobby-on-board) */
#room-code-banner {
  display: none; position: fixed; top: 12px; right: 12px; z-index: 100;
  background: linear-gradient(135deg, rgba(233,69,96,0.85), rgba(160,30,55,0.92));
  border-radius: 14px; padding: 10px 20px; text-align: center;
  box-shadow: 0 4px 24px rgba(233,69,96,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.12);
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  backdrop-filter: blur(8px);
}
#room-code-banner .room-label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.65); margin-bottom: 3px; font-family: 'Rajdhani', sans-serif; }
#room-code-banner .room-code { font-size: 22px; font-weight: 900; letter-spacing: 5px; color: #fff; font-family: 'Orbitron', monospace; }

/* Waiting overlay in center HUD */
#waiting-overlay {
  display: none; flex-direction: column; align-items: center; gap: 12px;
  pointer-events: auto;
}
#waiting-overlay .waiting-title {
  font-family: 'Orbitron', sans-serif; font-size: 1.1em; font-weight: 700; color: #e94560;
  letter-spacing: 1px;
}
#waiting-overlay .waiting-players { font-size: 0.9em; color: rgba(255,255,255,0.5); font-weight: 500; }
.waiting-btn {
  padding: 11px 26px; border: none; border-radius: 12px; font-size: 0.9em; font-weight: 700;
  cursor: pointer; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  font-family: 'Rajdhani', sans-serif; letter-spacing: 0.5px; text-transform: uppercase;
}
.waiting-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.35); }
.btn-start-game { background: linear-gradient(135deg, #e94560, #c0392b); color: #fff; box-shadow: 0 4px 16px rgba(233,69,96,0.25); }
.btn-start-game:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-add-bot { background: linear-gradient(135deg, #3498db, #2471a3); color: #fff; box-shadow: 0 4px 16px rgba(52,152,219,0.25); }
.waiting-btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

/* ============ BOARD ============ */
#board-container {
  position: absolute; top: calc(50% + 20px); left: 50%; transform: translate(-50%, -50%) scale(0.92);
  width: 1020px; height: 1020px; z-index: 1;
}
#board {
  width: 1020px; height: 1020px; position: relative;
  background: linear-gradient(135deg, #141428 0%, #0e1625 50%, #0a1020 100%);
  border-radius: 12px;
  border: 2px solid rgba(233,69,96,0.2);
  box-shadow: 0 0 60px rgba(233,69,96,0.12), 0 0 120px rgba(83,52,131,0.08), inset 0 0 40px rgba(0,0,0,0.6);
}

/* Board cells */
.cell {
  position: absolute; border: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column;
  align-items: center; justify-content: center; font-size: 10px; text-align: center;
  overflow: hidden; cursor: pointer; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  background: linear-gradient(145deg, #161630 0%, #0c0f1e 100%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), inset 0 -1px 0 rgba(0,0,0,0.2);
}
.cell:hover {
  filter: brightness(1.3); z-index: 5; transform: scale(1.06);
  box-shadow: inset 0 0 15px rgba(233,69,96,0.2), 0 0 20px rgba(233,69,96,0.12), 0 8px 25px rgba(0,0,0,0.3);
  border-color: rgba(233,69,96,0.3);
}
.cell .color-bar {
  position: absolute; width: 100%; height: 18px; min-height: 18px; max-height: 18px;
  background: var(--bar-color, rgba(255,255,255,0.08));
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 700; color: #fff; letter-spacing: 0.5px;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  transition: all 0.4s ease;
  z-index: 3;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.cell .color-bar .bar-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
/* Bottom row: bar on top */
.cell.bottom .color-bar { top: 0; }
/* Top row: bar on bottom */
.cell.top .color-bar { bottom: 0; }
/* Left col: bar on right */
.cell.left .color-bar { width: 18px; height: 100% !important; min-height: 100% !important; max-height: 100% !important; right: 0; top: 0; writing-mode: vertical-rl; text-orientation: mixed; font-size: 8px; }
.cell.left .color-bar .bar-text { overflow: visible; text-overflow: clip; }
/* Right col: bar on left */
.cell.right .color-bar { width: 18px; height: 100% !important; min-height: 100% !important; max-height: 100% !important; left: 0; top: 0; writing-mode: vertical-rl; text-orientation: mixed; font-size: 8px; }
.cell.right .color-bar .bar-text { overflow: visible; text-overflow: clip; }
/* Owned state glow */
.cell .color-bar.owned { box-shadow: inset 0 0 8px rgba(255,255,255,0.2); }

.cell .cell-art {
  font-size: 16px; z-index: 1; line-height: 1; margin-bottom: 2px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.cell .cell-art .art-main { font-size: 26px; line-height: 1; }
.cell .cell-art .art-scene { font-size: 11px; line-height: 1; letter-spacing: -1px; opacity: 0.85; }
.cell .cell-art .art-detail { font-size: 9px; line-height: 1; opacity: 0.7; }
.cell .cell-name { font-size: 10px; font-weight: 600; color: #c8c8e0; line-height: 1.2; padding: 1px 4px; z-index: 1; font-family: 'Rajdhani', sans-serif; }
.cell .cell-price { font-size: 9.5px; color: #888; z-index: 1; }
.cell .cell-icon { font-size: 26px; z-index: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }

/* Themed cell backgrounds per color group */
.cell[data-group="brown"] { background: linear-gradient(160deg, #241a10 0%, #150e08 100%); }
.cell[data-group="lightblue"] { background: linear-gradient(160deg, #101e30 0%, #0a1420 100%); }
.cell[data-group="pink"] { background: linear-gradient(160deg, #241020 0%, #180a14 100%); }
.cell[data-group="orange"] { background: linear-gradient(160deg, #24180a 0%, #181006 100%); }
.cell[data-group="red"] { background: linear-gradient(160deg, #241010 0%, #180a0a 100%); }
.cell[data-group="yellow"] { background: linear-gradient(160deg, #242010 0%, #18160a 100%); }
.cell[data-group="green"] { background: linear-gradient(160deg, #102414 0%, #0a180e 100%); }
.cell[data-group="blue"] { background: linear-gradient(160deg, #101424 0%, #0a0e18 100%); }
.cell[data-group="railroad"] { background: linear-gradient(160deg, #181a1c 0%, #101214 100%); }
.cell[data-group="utility"] { background: linear-gradient(160deg, #181a24 0%, #10121c 100%); }

/* Corner cells */
.cell.corner {
  width: 128px; height: 128px; font-size: 13px;
  background: linear-gradient(135deg, #161630 0%, #0c1020 100%);
  border-color: rgba(233,69,96,0.12);
}
.cell.corner .cell-icon { font-size: 38px; filter: drop-shadow(0 3px 8px rgba(0,0,0,0.4)); }
.cell.corner .cell-name { font-size: 12px; font-family: 'Orbitron', sans-serif; font-weight: 700; letter-spacing: 0.5px; }
.cell.corner .corner-sub { font-size: 9px; color: #666; margin-top: 2px; }

/* JACKPOT cell — Culling Games theme */
.cell.jackpot-cell {
  border: 1px solid rgba(180,40,40,0.4) !important;
  box-shadow: inset 0 0 20px rgba(140,20,20,0.15);
}
.jackpot-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(5,5,10,0.7);
  z-index: 1;
}
.jackpot-points {
  font-family: 'Cormorant Garamond', 'Computer Modern', Georgia, serif;
  font-weight: 700;
  font-size: 20px;
  color: #e8e8e8;
  letter-spacing: 1px;
  line-height: 1;
  z-index: 2;
  text-shadow: 0 0 8px rgba(200,180,160,0.3);
}
.jackpot-label {
  font-family: 'Cormorant Garamond', 'Computer Modern', Georgia, serif;
  font-weight: 600;
  font-size: 9px;
  color: rgba(200,180,160,0.6);
  text-transform: uppercase;
  letter-spacing: 3px;
  line-height: 1;
  z-index: 2;
}
.jackpot-title {
  font-family: 'Cormorant Garamond', 'Computer Modern', Georgia, serif;
  font-weight: 700;
  font-size: 13px;
  color: rgba(220,200,180,0.85);
  letter-spacing: 2px;
  text-transform: uppercase;
  z-index: 2;
  margin-top: 2px;
}
.jackpot-rule {
  width: 50px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(180,140,100,0.3), transparent);
  z-index: 2; margin: 3px 0;
}

/* Cells with background images */
.cell.has-bg-img {
  background-size: cover; background-position: center; background-repeat: no-repeat;
}
.cell.has-bg-img .cell-name,
.cell.has-bg-img .cell-price {
  background: rgba(0,0,0,0.65); padding: 1px 4px; border-radius: 3px; color: #fff;
}
.cell.has-bg-img .cell-art { display: none; }

/* Cells with emblem images — fixed centering */
.cell .cell-emblem {
  width: 38px; height: 38px; object-fit: contain; z-index: 1;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  border-radius: 4px; flex-shrink: 0;
}
.cell.corner .cell-emblem {
  width: 54px; height: 54px;
}
/* Emblem cells with white-bg logos get a white backing */
.cell .cell-emblem.logo-bg {
  background: rgba(255,255,255,0.9); padding: 3px; border-radius: 6px;
}
/* Ensure emblem cells have consistent vertical layout */
.cell.has-emblem {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 2px; padding: 4px 2px;
}
.cell.has-emblem .cell-name { margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.cell.has-emblem .cell-price { margin: 0; }

/* Player tokens on board — colored circles */
.token-on-board {
  position: absolute; z-index: 10; width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.85);
  box-shadow: 0 2px 6px rgba(0,0,0,0.6), 0 0 14px var(--token-color, #e94560);
  transition: left 0.6s cubic-bezier(0.34,1.56,0.64,1), top 0.6s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
  background: var(--token-color, #e94560);
  /* Glossy effect */
  background-image: radial-gradient(ellipse at 35% 25%, rgba(255,255,255,0.4) 0%, transparent 60%);
}

/* ============ SIDE PANELS ============ */
#top-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 52px;
  background: linear-gradient(135deg, rgba(14,12,28,0.97) 0%, rgba(10,16,30,0.97) 100%);
  display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.4), 0 1px 0 rgba(233,69,96,0.1);
  z-index: 20; backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(233,69,96,0.08);
}
#top-bar .game-title {
  font-family: 'Orbitron', sans-serif; font-size: 1.1em; font-weight: 900; letter-spacing: 2px;
  background: linear-gradient(135deg, #e94560 0%, #ff6b81 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
#top-bar .turn-info { color: #8a8ab0; font-size: 0.9em; font-weight: 500; }

#players-panel {
  position: absolute; top: 55px; left: 10px; width: 210px; z-index: 15;
  display: flex; flex-direction: column; gap: 5px;
}
.player-card {
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, rgba(16,20,35,0.9) 0%, rgba(12,14,28,0.9) 100%);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.05); border-radius: 14px;
  padding: 8px 12px; transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.player-card:hover { background: linear-gradient(135deg, rgba(22,28,48,0.95) 0%, rgba(18,22,40,0.95) 100%); transform: translateX(3px); }
.player-card.active {
  border-color: rgba(233,69,96,0.4);
  box-shadow: 0 0 24px rgba(233,69,96,0.2), 0 4px 16px rgba(0,0,0,0.3), inset 0 0 12px rgba(233,69,96,0.04);
  background: linear-gradient(135deg, rgba(30,20,45,0.92) 0%, rgba(20,25,42,0.92) 100%);
}
.player-card.bankrupt { opacity: 0.25; filter: grayscale(0.7); }
.pc-emoji {
  font-size: 1.6em; width: 40px; height: 40px; display: flex; align-items: center;
  justify-content: center; border-radius: 10px; flex-shrink: 0;
  background: rgba(255,255,255,0.04);
}
.player-card.active .pc-emoji { background: rgba(233,69,96,0.12); }
.pc-details { flex: 1; min-width: 0; }
.pc-name { font-weight: 600; font-size: 0.85em; color: #d0d0e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pc-you { font-size: 0.7em; color: #e94560; font-weight: 400; margin-left: 4px; }
.pc-stats { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
.pc-money { color: #f5a623; font-size: 0.8em; font-weight: 600; }
.pc-props { color: #666; font-size: 0.7em; }
.pc-jail { color: #e94560; font-size: 0.7em; }
.pc-color-dots { display: flex; gap: 2px; margin-top: 3px; flex-wrap: wrap; }
.pc-color-dot { width: 6px; height: 6px; border-radius: 2px; }

/* ============ CENTER HUD (floating overlay) ============ */
#center-hud {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 25; text-align: center; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  pointer-events: none; transition: opacity 0.4s ease;
}
#center-hud.minimized { opacity: 0.25; }
#center-hud.minimized:hover { opacity: 1; pointer-events: auto; }
#hud-player { font-size: 3.5em; line-height: 1; filter: drop-shadow(0 0 16px rgba(0,0,0,0.8)); }
#hud-player-name { color: #b0b0d0; font-size: 1em; margin-top: 4px; font-weight: 600; font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; }
#hud-dice { display: flex; gap: 14px; align-items: center; justify-content: center; min-height: 76px; }
#hud-msg { color: #9090b0; font-size: 0.9em; min-height: 22px; line-height: 1.4; max-width: 320px; font-weight: 500; }
#hud-buttons { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; pointer-events: auto; }
.action-btn {
  padding: 11px 24px; border-radius: 24px; border: none; font-size: 13px; cursor: pointer;
  font-weight: 700; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  background: linear-gradient(135deg, #222244 0%, #16163a 100%);
  color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  font-family: 'Rajdhani', sans-serif; letter-spacing: 0.8px; text-transform: uppercase;
  position: relative; overflow: hidden;
}
.action-btn::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.08), transparent);
  pointer-events: none; border-radius: 24px 24px 0 0;
}

/* ====== TRUE 3D DICE — CSS cube with 6 faces ====== */
#hud-dice {
  perspective: 800px;
  display: flex; align-items: center; justify-content: center;
  height: 80px; margin: 4px 0;
}
/* 3D Dice Scene */
.dice-scene {
  perspective: 600px;
  display: flex; gap: 28px; position: relative;
  justify-content: center; align-items: center;
  padding: 10px 0 20px;
}
/* Ground shadow beneath dice */
.dice-scene::after {
  content: ''; position: absolute;
  bottom: 2px; left: 50%; width: 130px; height: 16px;
  transform: translateX(-50%);
  background: radial-gradient(ellipse, rgba(0,0,0,0.4) 0%, transparent 70%);
  border-radius: 50%; pointer-events: none;
}
/* Isometric wrapper — gentle tilt to show front face prominently + hint of top/right */
.dice-iso {
  transform-style: preserve-3d;
  transform: rotateX(20deg) rotateY(-18deg);
}
/* The 3D cube */
.dice-cube {
  width: 3.4rem; height: 3.4rem; position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(.2,.85,.3,1.1);
}
.dice-cube.rolling {
  transition: none;
  animation: cubeRoll 0.45s ease-in-out infinite;
}
.dice-cube.idle {
  animation: cubeFloat 3.5s ease-in-out infinite;
}
/* Each face */
.dice-face {
  position: absolute; width: 3.4rem; height: 3.4rem;
  background: linear-gradient(145deg, #fefefe 0%, #f4f4f4 40%, #e8e8ea 100%);
  border-radius: 0.5rem; border: 1px solid rgba(0,0,0,0.06);
  box-shadow: inset 0 2px 4px rgba(255,255,255,0.95), inset 0 -2px 4px rgba(0,0,0,0.06);
  display: grid;
  grid-template-areas: "a b c" "d e f" "g h i";
  grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr);
  align-items: center; justify-items: center;
  padding: 15%; box-sizing: border-box;
  backface-visibility: hidden;
}
/* Face positions — half of 3.4rem = 1.7rem */
.dice-face.f-front  { transform: translateZ(1.7rem); }
.dice-face.f-back   { transform: rotateY(180deg) translateZ(1.7rem); }
.dice-face.f-right  { transform: rotateY(90deg)  translateZ(1.7rem); }
.dice-face.f-left   { transform: rotateY(-90deg) translateZ(1.7rem); }
.dice-face.f-top    { transform: rotateX(90deg)  translateZ(1.7rem); }
.dice-face.f-bottom { transform: rotateX(-90deg) translateZ(1.7rem); }
/* Dots — deep inset look */
.dice-dot {
  width: 0.48rem; height: 0.48rem; border-radius: 50%;
  background: radial-gradient(circle at 38% 38%, #555, #1a1a1a);
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.5), 0 0.5px 0 rgba(255,255,255,0.15);
}
/* Dot placement by grid area for each value */
.dice-face[data-val="1"] .dice-dot { grid-area: e; }
.dice-face[data-val="2"] .dice-dot:nth-child(1) { grid-area: c; }
.dice-face[data-val="2"] .dice-dot:nth-child(2) { grid-area: g; }
.dice-face[data-val="3"] .dice-dot:nth-child(1) { grid-area: c; }
.dice-face[data-val="3"] .dice-dot:nth-child(2) { grid-area: e; }
.dice-face[data-val="3"] .dice-dot:nth-child(3) { grid-area: g; }
.dice-face[data-val="4"] .dice-dot:nth-child(1) { grid-area: a; }
.dice-face[data-val="4"] .dice-dot:nth-child(2) { grid-area: c; }
.dice-face[data-val="4"] .dice-dot:nth-child(3) { grid-area: g; }
.dice-face[data-val="4"] .dice-dot:nth-child(4) { grid-area: i; }
.dice-face[data-val="5"] .dice-dot:nth-child(1) { grid-area: a; }
.dice-face[data-val="5"] .dice-dot:nth-child(2) { grid-area: c; }
.dice-face[data-val="5"] .dice-dot:nth-child(3) { grid-area: e; }
.dice-face[data-val="5"] .dice-dot:nth-child(4) { grid-area: g; }
.dice-face[data-val="5"] .dice-dot:nth-child(5) { grid-area: i; }
.dice-face[data-val="6"] .dice-dot:nth-child(1) { grid-area: a; }
.dice-face[data-val="6"] .dice-dot:nth-child(2) { grid-area: c; }
.dice-face[data-val="6"] .dice-dot:nth-child(3) { grid-area: d; }
.dice-face[data-val="6"] .dice-dot:nth-child(4) { grid-area: f; }
.dice-face[data-val="6"] .dice-dot:nth-child(5) { grid-area: g; }
.dice-face[data-val="6"] .dice-dot:nth-child(6) { grid-area: i; }
@keyframes cubeRoll {
  0%   { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
  25%  { transform: rotateX(95deg) rotateY(130deg) rotateZ(50deg); }
  50%  { transform: rotateX(210deg) rotateY(280deg) rotateZ(130deg); }
  75%  { transform: rotateX(310deg) rotateY(420deg) rotateZ(210deg); }
  100% { transform: rotateX(360deg) rotateY(540deg) rotateZ(280deg); }
}
@keyframes cubeFloat {
  0%,100% { transform: var(--dice-rot) translateY(0); }
  50%     { transform: var(--dice-rot) translateY(-5px); }
}

#board-center-art {

/* ============ ANIMATIONS ============ */
@keyframes bounceIn { 0%{transform:scale(0.3);opacity:0} 40%{transform:scale(1.06)} 70%{transform:scale(0.97)} 100%{transform:scale(1);opacity:1} }
@keyframes shake { 0%,100%{transform:rotate(0) scale(1)} 15%{transform:rotate(-18deg) scale(1.1)} 30%{transform:rotate(16deg) scale(0.95)} 45%{transform:rotate(-14deg) scale(1.05)} 60%{transform:rotate(10deg) scale(0.98)} 80%{transform:rotate(-5deg) scale(1)} }
@keyframes fadeSlideUp { 0%{opacity:0;transform:translateY(10px)} 100%{opacity:1;transform:translateY(0)} }
@keyframes pulseGlow { 0%,100%{box-shadow:0 0 8px rgba(233,69,96,0.15)} 50%{box-shadow:0 0 22px rgba(233,69,96,0.5)} }
@keyframes tokenLand { 0%{transform:scale(1) translateY(0)} 30%{transform:scale(1.4) translateY(-10px)} 50%{transform:scale(0.92) translateY(1px)} 70%{transform:scale(1.1) translateY(-2px)} 100%{transform:scale(1) translateY(0)} }
@keyframes cellPulse { 0%{box-shadow:inset 0 0 20px rgba(233,69,96,0.15), 0 0 16px rgba(233,69,96,0.12)} 50%{box-shadow:inset 0 0 30px rgba(233,69,96,0.35), 0 0 24px rgba(233,69,96,0.2)} 100%{box-shadow:inset 0 0 20px rgba(233,69,96,0.15), 0 0 16px rgba(233,69,96,0.12)} }
@keyframes slideInLeft { 0%{transform:translateX(-20px);opacity:0} 100%{transform:translateX(0);opacity:1} }
@keyframes popIn { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
@keyframes glowPulse { 0%,100%{filter:drop-shadow(0 0 6px rgba(233,69,96,0.25))} 50%{filter:drop-shadow(0 0 14px rgba(233,69,96,0.65))} }
@keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }

.bounce-in { animation: bounceIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
.fade-slide-up { animation: fadeSlideUp 0.3s ease; }
.pulse-glow { animation: pulseGlow 1.5s ease infinite; }

/* Smooth transitions for player cards */
.player-card { transition: all 0.35s cubic-bezier(0.4,0,0.2,1), border-color 0.35s ease, box-shadow 0.35s ease; }
.player-card.active { animation: slideInLeft 0.3s ease; }

/* Smooth token movement */
.token-moving { animation: tokenLand 0.55s cubic-bezier(0.34,1.56,0.64,1); }

/* Current player's token glows */
.token-on-board.current-player { animation: glowPulse 2.5s ease infinite; }

/* Log entry animation */
.log-entry { animation: fadeSlideUp 0.2s ease; }
.log-entry:first-child { color: #d0d0e8; }

/* Action panel auto-minimize after showing */
#action-panel { transition: opacity 0.4s ease, transform 0.4s ease; }

/* Owner indicator animation */
.owner-dot { transition: opacity 0.3s ease, transform 0.3s ease; }
.owner-dot:hover { transform: scale(1.3); }

/* Board cell highlight on landing */
.cell.highlight {
  animation: cellPulse 1.4s ease infinite;
  border-color: rgba(233,69,96,0.4);
  z-index: 4;
}

/* Action buttons entrance */

.action-btn:nth-child(1) { animation-delay: 0s; }
.action-btn:nth-child(2) { animation-delay: 0.06s; }
.action-btn:nth-child(3) { animation-delay: 0.12s; }
.action-btn:nth-child(4) { animation-delay: 0.18s; }
.action-btn:nth-child(5) { animation-delay: 0.24s; }

let myId = null;

function initEmojiPicker() {
  const picker = document.getElementById('emoji-picker');
  PLAYER_COLORS.forEach((color,i) => {
    const d = document.createElement('div');
    d.className = 'emoji-opt' + (i===0?' selected':'');
    d.innerHTML = `<div style="width:30px;height:30px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,0.5);box-shadow:0 0 8px ${color}"></div>`;
    d.onclick = () => {
      document.querySelectorAll('.emoji-opt').forEach(x => x.classList.remove('selected'));
      d.classList.add('selected');
      selectedEmoji = color;
    };
    picker.appendChild(d);
  });
  selectedEmoji = PLAYER_COLORS[0];
}
initEmojiPicker();

function getPlayerName() {
  return document.getElementById('inp-name').value.trim() || 'Player';
}

function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i=0;i<5;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

function setStatus(msg) {
  const el = document.getElementById('lobby-status');
  if(el) el.textContent = msg;
}

// HOST: Create Room (tries WebSocket, falls back to local)
function createRoom() {
  isHost = true;
  roomCode = generateRoomCode();
  setStatus('Creating room...');

  // If opened as a file or no host, go straight to local mode
  if(!location.host || location.protocol === 'file:') {
    startLocalWaiting();
    return;
  }

  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  let wsConnected = false;

  try {
    ws = new WebSocket(`${protocol}//${location.host}`);
  } catch(e) {
    startLocalWaiting();
    return;
  }

  // Timeout fallback — if WS doesn't respond in 3 seconds, start local
  let roomReady = false;
  const wsTimeout = setTimeout(() => {
    if(!roomReady) {
      try { ws.close(); } catch(e) {}
      ws = null;
      startLocalWaiting();
    }
  }, 3000);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'createRoom', roomCode }));
  };

  ws.onmessage = (e) => {
    let data;
    try { data = JSON.parse(e.data); } catch { return; }

    if (data.type === 'roomCreated') {
      roomReady = true;
      clearTimeout(wsTimeout);
      gameState = createInitialState();
      addPlayerToState(getPlayerName(), selectedEmoji);
      myPlayerIndex = 0;
      gameState.phase = 'waiting';
      showGameScreenWaiting();
      return;
    }
    if (data.type === 'error') {
      roomReady = true;
      clearTimeout(wsTimeout);
      setStatus(data.message);
      return;
    }
    handleHostMessage(data);
  };

  ws.onerror = () => {
    if(!roomReady) {
      roomReady = true;
      clearTimeout(wsTimeout);
      ws = null;
      startLocalWaiting();
    }
  };
  ws.onclose = () => {
    if(!roomReady) {
      roomReady = true;
      clearTimeout(wsTimeout);
      ws = null;
      startLocalWaiting();
    } else if (document.getElementById('game').style.display !== 'none') {
      addLog('⚠️ Server connection lost!');
    }
  };
}

// Start local waiting room (no WebSocket needed)
function startLocalWaiting() {
  isHost = true;
  roomCode = 'LOCAL';
  gameState = createInitialState();
  addPlayerToState(getPlayerName(), selectedEmoji);
  myPlayerIndex = 0;
  gameState.phase = 'waiting';
  showGameScreenWaiting();
}

// GUEST: Join Room
function joinRoom() {
  const code = document.getElementById('inp-room').value.trim().toUpperCase();
  if (!code) return;
  roomCode = code;
  isHost = false;
  setStatus('Connecting...');

  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'joinRoom', roomCode, name: getPlayerName(), emoji: selectedEmoji }));
  };

  ws.onmessage = (e) => {
    let data;
    try { data = JSON.parse(e.data); } catch { return; }

    if (data.type === 'joined') {
      document.getElementById('lobby-main').style.display = 'none';
      document.getElementById('lobby-joining').style.display = 'block';
      document.getElementById('lobby-guest-status').textContent = 'Connected! Waiting for host to start...';
      return;
    }
    if (data.type === 'error') {
      setStatus(data.message);
      return;
    }
    if (data.type === 'hostDisconnected') {
      document.getElementById('lobby-guest-status').textContent = 'Host disconnected!';
      addLog('⚠️ Host disconnected!');
      return;
    }
    handleGuestMessage(data);
  };

  ws.onerror = () => setStatus('Connection error');
  ws.onclose = () => {
    document.getElementById('lobby-guest-status').textContent = 'Disconnected!';
  };
}

// HOST: handle messages from guests (via relay server)
function handleHostMessage(data) {
  if(data.type === 'join') {
    const idx = addPlayerToState(data.name, data.emoji);
    socketIdToPlayerIdx[data.socketId] = idx;
    playerIdxToSocketId[idx] = data.socketId;
    // Tell this specific guest their index
    wsSend({ type:'assignIndex', index: idx, _targetSocketId: data.socketId });
    broadcastState();
    // Update UI depending on phase
    if(gameState.phase === 'waiting') {
      updateWaitingOverlay();
    } else {
      updateLobbyPlayerList();
    }
  }
  if(data.type === 'action') {
    const pi = data._senderSocketId ? socketIdToPlayerIdx[data._senderSocketId] : myPlayerIndex;
    handlePlayerAction(pi, data.action, data.payload);
  }
  if(data.type === 'chat') {
    // Host receives chat from a guest, then relays to all other guests
    receiveChatMessage(data.msg);
    wsSend({ type:'chat', msg: data.msg, _excludeSocketId: data._senderSocketId });
  }
  if(data.type === 'guestDisconnected') {
    const pi = socketIdToPlayerIdx[data.socketId];
    if(pi !== undefined && gameState && gameState.players[pi] && !gameState.players[pi].bankrupt) {
      addLog(`⚠️ ${gameState.players[pi].emoji} ${gameState.players[pi].name} disconnected`);
      renderGame();
    }
  }
}

// Helper: send JSON via WebSocket
function wsSend(data) {
  if(ws && ws.readyState === 1) ws.send(JSON.stringify(data));
}

// GUEST: handle messages from host
function handleGuestMessage(data) {
  if(data.type === 'assignIndex') {
    myPlayerIndex = data.index;
  }
  if(data.type === 'state') {
    gameState = data.state;
    // Show/hide card overlay for guests
    if(gameState.cardDisplay) {
      const cd = gameState.cardDisplay;
      showCardOverlay(cd.playerName, cd.playerEmoji, cd.cardText, cd.deckType);
    } else {
      hideCardOverlay();
    }
    if(document.getElementById('game').style.display === 'flex') {
      if(gameState.phase === 'waiting') {
        renderPlayerCards();
      } else {
        renderGame();
      }
    } else if(gameState.phase === 'waiting') {
      // Guest just joined — show the board in waiting mode
      showGuestWaiting();
    }
  }
  if(data.type === 'startGame') {
    gameState = data.state;
    // If already on game screen (from waiting mode), just start rendering
    document.getElementById('waiting-overlay').style.display = 'none';
    document.getElementById('room-code-banner').style.display = 'none';
    if(document.getElementById('game').style.display === 'flex') {
      renderGame();
    } else {
      showGameScreen();
    }
  }
  if(data.type === 'lobbyUpdate') {
    const list = document.getElementById('lobby-players-guest');
    if(list) {
      list.innerHTML = data.players.map(p => `<div><span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${p.emoji};vertical-align:middle;margin-right:6px;border:1px solid rgba(255,255,255,0.4)"></span>${p.name}</div>`).join('');
    }
  }
  if(data.type === 'tradeIncoming') {
    // Show trade modal to the target player
    if(data.trade.to === myPlayerIndex) {
      showIncomingTrade(data.trade);
    }
  }
  if(data.type === 'chat') {
    // Guest receives chat relayed from host (avoid duplicating own messages)
    if(data.msg.from !== myPlayerIndex) {
      receiveChatMessage(data.msg);
    }
  }
  if(data.type === 'votekick') {
    activeVotekick = data.vote;
    showVotekickModal();
  }
  if(data.type === 'votekickResult') {
    activeVotekick = null;
    closeVotekickModal();
    // State update will come via the normal state broadcast
  }
}

function broadcastState() {
  wsSend({ type:'state', state: gameState });
  wsSend({ type:'lobbyUpdate', players: gameState.players });
  updateLobbyPlayerList();
}

function updateLobbyPlayerList() {
  const list = document.getElementById('lobby-players');
  if(!list || !gameState) return;
  list.innerHTML = gameState.players.map(p => `<div><span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${p.emoji};vertical-align:middle;margin-right:6px;border:1px solid rgba(255,255,255,0.4)"></span>${p.name}</div>`).join('');
  const btn = document.getElementById('btn-start-game');
  if(btn) btn.disabled = gameState.players.length < 2;
}

function createInitialState() {
  return {
    players: [],
    properties: BOARD.map(cell => ({
      owner: -1, // -1 = Yahu (bank)
      houses: 0,
      mortgaged: false,
    })),
    currentPlayer: 0,
    phase: 'roll', // roll, postRoll, pay, jail, gameOver
    doublesCount: 0,
    lastDice: [0,0],
    freeParkingPot: 0,
    message: '',
    log: [],
    turnActions: {}, // track what happened this turn
  };
}

function addPlayerToState(name, emoji) {
  gameState.players.push({
    name, emoji,
    money: 1500,
    position: 0,
    properties: [],
    inJail: false,
    jailTurns: 0,
    jailCards: 0,
    bankrupt: false,
  });
  return gameState.players.length - 1;
}

// =============================================
const BOT_NAMES = ['Yahu Jr.', 'Cookie Monster', 'BART Bot', 'Golden Bot', 'Monkey Bot', 'Tax Man', 'Settler Bot', 'Dice Lord'];
let botCount = 0;

function addBot() {
  if(!isHost || !gameState) return;
  const name = BOT_NAMES[botCount % BOT_NAMES.length];
  botCount++;
  const idx = addPlayerToState(name, PLAYER_COLORS[(gameState.players.length - 1) % PLAYER_COLORS.length]);
  gameState.players[idx].isBot = true;
  broadcastState();
  updateWaitingOverlay();
}

function startGame() {
  if(!isHost || gameState.players.length < 2) return;
  gameState.phase = 'roll';
  gameState.currentPlayer = 0;
  gameState.message = `${gameState.players[0].name}'s turn - Roll the dice!`;
  addLog(`Game started with ${gameState.players.length} players!`);

  // Hide waiting overlay, show normal HUD
  document.getElementById('waiting-overlay').style.display = 'none';
  document.getElementById('room-code-banner').style.display = 'none';

  // Tell all guests
  wsSend({ type:'startGame', state: gameState });

  // If already on game screen (waiting mode), just render
  if(document.getElementById('game').style.display === 'flex') {
    renderGame();
  } else {
    showGameScreen();
  }
}

  // Hide waiting UI
  document.getElementById('waiting-overlay').style.display = 'none';
  document.getElementById('room-code-banner').style.display = 'none';
  // Fade out lobby
  lobby.style.transition = 'opacity 0.4s ease';
  lobby.style.opacity = '0';
  setTimeout(() => {
    lobby.style.display = 'none';
    game.style.display = 'flex';
    game.style.opacity = '0';
    game.style.transition = 'opacity 0.5s ease';
    buildBoard();
    renderGame();
    // Fade in game
    requestAnimationFrame(() => { game.style.opacity = '1'; });
  }, 400);
}

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  const boardSize = 1020;
  const cornerSize = 128;
  const cellW = 85; // (1020 - 2*128) / 9 ≈ 85
  const cellH = 128;

  BOARD.forEach((cell, i) => {
    const div = document.createElement('div');
    div.className = 'cell';
    div.id = 'cell-' + i;
    div.onclick = () => showPropertyInfo(i);

    let x, y, w, h, side = '';

    if(i === 0) { // GO - bottom right
      x = boardSize - cornerSize; y = boardSize - cornerSize; w = cornerSize; h = cornerSize;
      div.classList.add('corner');
    } else if(i >= 1 && i <= 9) { // Bottom row, right to left
      x = boardSize - cornerSize - (i) * cellW; y = boardSize - cornerSize;
      w = cellW; h = cornerSize; side = 'bottom';
    } else if(i === 10) { // Jail - bottom left
      x = 0; y = boardSize - cornerSize; w = cornerSize; h = cornerSize;
      div.classList.add('corner');
    } else if(i >= 11 && i <= 19) { // Left column, bottom to top
      x = 0; y = boardSize - cornerSize - (i-10) * cellW;
      w = cornerSize; h = cellW; side = 'left';
    } else if(i === 20) { // Free parking - top left
      x = 0; y = 0; w = cornerSize; h = cornerSize;
      div.classList.add('corner');
    } else if(i >= 21 && i <= 29) { // Top row, left to right
      x = cornerSize + (i-21) * cellW; y = 0;
      w = cellW; h = cornerSize; side = 'top';
    } else if(i === 30) { // Go to jail - top right
      x = boardSize - cornerSize; y = 0; w = cornerSize; h = cornerSize;
      div.classList.add('corner');
    } else if(i >= 31 && i <= 39) { // Right column, top to bottom
      x = boardSize - cornerSize; y = cornerSize + (i-31) * cellW;
      w = cornerSize; h = cellW; side = 'right';
    }

    if(side) div.classList.add(side);

    div.style.left = x + 'px';
    div.style.top = y + 'px';
    div.style.width = w + 'px';
    div.style.height = h + 'px';

    // Set group data attribute for themed backgrounds
    if(cell.group) div.dataset.group = cell.group;
    if(cell.type) div.dataset.celltype = cell.type;

    // Color bar for buyable properties — shows price when unowned, player color when owned
    const hasBar = cell.price && (cell.type === 'property' || cell.type === 'railroad' || cell.type === 'utility');
    if(hasBar) {
      const bar = document.createElement('div');
      bar.className = 'color-bar';
      bar.id = 'bar-' + i;
      bar.style.setProperty('--bar-color', cell.color ? COLORS[cell.color] : 'rgba(255,255,255,0.1)');
      bar.innerHTML = `<span class="bar-text">${cell.price}${COOKIE_ICON}</span>`;
      div.appendChild(bar);
    }

    // Content — check for custom image first
    const imgKey = CELL_IMAGE_MAP[i];
    const imgSrc = imgKey && typeof CELL_IMAGES !== 'undefined' ? CELL_IMAGES[imgKey] : null;

    // Decide: background (photos/scenes) vs emblem (logos)
    const BG_IMAGES = ['goldenhills','pool','jackpot','goldenscar','yahutax','thefields','heatherfarms','kenya','oaklandtemple','rudgear','sorenshouse','colebouyeas','palmerrd','pokemonvm','shibuya','moriohstation','sandiego','gokugo','theuncle','johnnysgarage'];
    const LOGO_IMAGES = ['innout','chickfila','bart','fitness','slavery','israel','cagedmonkey','brutal','boostercookie'];
    const useBg = imgSrc && BG_IMAGES.includes(imgKey);
    const useLogo = imgSrc && LOGO_IMAGES.includes(imgKey);

    if(i === 20) {
      // JACKPOT — Culling Games themed with background image
      div.classList.add('jackpot-cell');
      if(imgSrc) {
        div.style.backgroundImage = `url(${imgSrc})`;
        div.style.backgroundSize = 'cover';
        div.style.backgroundPosition = 'center';
        div.classList.add('has-bg-img');
      }
      div.innerHTML += `
        <div class="jackpot-overlay"></div>
        <div class="jackpot-points" id="jackpot-points">0</div>
        <div class="jackpot-rule"></div>
        <div class="jackpot-title">JACKPOT</div>
        <div class="jackpot-label">points</div>
      `;
    } else if(i === 0 && imgSrc) {
      // Start corner — booster cookie image as icon
      div.innerHTML += `<img src="${imgSrc}" style="width:48px;height:48px;object-fit:contain;z-index:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5))">`;
      div.innerHTML += `<div class="cell-name">${cell.name}</div>`;
      if(cell.cornerSub) div.innerHTML += `<div class="corner-sub">${cell.cornerSub}</div>`;
    } else if(cell.type === 'corner' && (useBg || useLogo)) {
      // Corner with custom image
      div.style.backgroundImage = `url(${imgSrc})`;
      div.style.backgroundSize = 'cover';
      div.style.backgroundPosition = 'center';
      div.classList.add('has-bg-img');
      div.innerHTML += `<div class="cell-name">${cell.name}</div>`;
      if(cell.cornerSub) div.innerHTML += `<div class="corner-sub" style="background:rgba(0,0,0,0.6);padding:1px 4px;border-radius:3px;color:#fff">${cell.cornerSub}</div>`;
    } else if(cell.type === 'corner') {
      div.innerHTML += `<div class="cell-icon">${cell.icon}</div><div class="cell-name">${cell.name}</div>`;
      if(cell.cornerSub) div.innerHTML += `<div class="corner-sub">${cell.cornerSub}</div>`;
    } else if(useBg) {
      // Full background image for photos/scenes
      div.style.backgroundImage = `url(${imgSrc})`;
      div.style.backgroundSize = 'cover';
      // For portrait images in horizontal cells, focus on top/face area
      div.style.backgroundPosition = (imgKey === 'yahutax') ? 'center 15%' : 'center';
      div.classList.add('has-bg-img');
      div.innerHTML += `<div class="cell-name">${cell.name}</div>`;
      if(cell.price && !hasBar) div.innerHTML += `<div class="cell-price">${cell.price}${COOKIE_ICON}</div>`;
    } else if(useLogo) {
      // Emblem/logo image — consistent layout
      div.classList.add('has-emblem');
      const needsWhiteBg = ['innout','chickfila','bart','fitness','israel'].includes(imgKey);
      div.innerHTML += `<img class="cell-emblem${needsWhiteBg ? ' logo-bg' : ''}" src="${imgSrc}" alt="${cell.name}">`;
      div.innerHTML += `<div class="cell-name">${cell.name}</div>`;
      if(cell.price && !hasBar) div.innerHTML += `<div class="cell-price">${cell.price}${COOKIE_ICON}</div>`;
    } else if(cell.art && typeof cell.art === 'object') {
      // Rich emoji art with main, scene
      div.innerHTML += `<div class="cell-art">
        <div class="art-main">${cell.art.main}</div>
        <div class="art-scene">${cell.art.scene}</div>
      </div>`;
      div.innerHTML += `<div class="cell-name">${cell.name}</div>`;
      if(cell.price && !hasBar) div.innerHTML += `<div class="cell-price">${cell.price}${COOKIE_ICON}</div>`;
    } else {
      const icon = cell.icon || '';
      div.innerHTML += `<div class="cell-name">${cell.name}</div>`;
      if(cell.price && !hasBar) div.innerHTML += `<div class="cell-price">${cell.price}${COOKIE_ICON}</div>`;
      if(icon) div.innerHTML += `<div class="cell-icon">${icon}</div>`;
    }

    board.appendChild(div);
  });

  // Center area — decorative board artwork
  const center = document.createElement('div');
  center.id = 'board-center-art';
  center.innerHTML = `
    <div class="center-ring"></div>
    <div class="center-ring center-ring-2"></div>
    <div class="center-title">ISRAEL<br><span>SIMULATOR</span></div>
    <div class="center-sub">A Booster Cookie Economy</div>
    <div class="center-cookie">${COOKIE_ICON ? COOKIE_ICON.replace('cookie-img"', 'cookie-img center-cookie-icon"') : '🍪'}</div>
    <div class="center-corners">
      <div class="cc cc-tl"></div><div class="cc cc-tr"></div>
      <div class="cc cc-bl"></div><div class="cc cc-br"></div>
    </div>
  `;
  board.appendChild(center);
}

function getCellCenter(index) {
  const el = document.getElementById('cell-' + index);
  if(!el) return {x:510,y:510};
  const cellX = parseInt(el.style.left);
  const cellY = parseInt(el.style.top);
  const cellW = parseInt(el.style.width);
  const cellH = parseInt(el.style.height);

  // Place tokens in the lower portion of the cell so names stay visible
  // For side cells (non-corner), offset toward the inner edge of the board
  const cell = BOARD[index];
  let x = cellX + cellW / 2;
  let y = cellY + cellH / 2;

  if(cell && cell.type === 'corner') {
    // Corners are big enough, just nudge down a bit
    y = cellY + cellH * 0.65;
  } else if(index >= 1 && index <= 9) {
    // Bottom row: push tokens toward bottom of cell
    y = cellY + cellH * 0.72;
  } else if(index >= 11 && index <= 19) {
    // Left column: push tokens toward left side
    x = cellX + cellW * 0.35;
  } else if(index >= 21 && index <= 29) {
    // Top row: push tokens toward top of cell
    y = cellY + cellH * 0.28;
  } else if(index >= 31 && index <= 39) {
    // Right column: push tokens toward right side
    x = cellX + cellW * 0.65;
  }

  return {x, y};
}

  const body = document.getElementById('my-props-body');
  if(!body || myPlayerIndex < 0) return;
  const me = gameState.players[myPlayerIndex];
  if(!me) return;
  body.innerHTML = '';
  const myProps = [];
  gameState.properties.forEach((prop, idx) => {

  });

    body.innerHTML = '<div class="mp-empty">No properties yet</div>';

    const div = document.createElement('div');
    div.className = 'mp-item' + (prop.mortgaged ? ' mortgaged' : '');

function renderTokens() {
  const board = document.getElementById('board');

  // Clear old highlights
  document.querySelectorAll('.cell.highlight').forEach(c => c.classList.remove('highlight'));

  // Highlight current player's cell
  const cp = gameState.players[gameState.currentPlayer];
  if(cp && !cp.bankrupt) {
    const cellEl = document.getElementById('cell-' + cp.position);
    if(cellEl) cellEl.classList.add('highlight');
  }

  // Reuse existing tokens if possible for smooth CSS transitions
  const existingTokens = {};
  document.querySelectorAll('.token-on-board').forEach(t => {
    existingTokens[t.dataset.playerIdx] = t;
  });

  const usedTokens = new Set();

  // Group players by position
  const posMap = {};
  gameState.players.forEach((p, i) => {
    if(p.bankrupt) return;
    if(!posMap[p.position]) posMap[p.position] = [];
    posMap[p.position].push(i);
  });

  Object.entries(posMap).forEach(([pos, indices]) => {
    const center = getCellCenter(parseInt(pos));
    indices.forEach((pi, offset) => {
      const ox = (offset % 3) * 20 - 10;
      const oy = Math.floor(offset / 3) * 20 - 10;
      const left = (center.x + ox - 14);
      const top = (center.y + oy - 14);

      let token = existingTokens[pi];
      if(token) {
        // Detect if position changed for landing animation
        const oldLeft = parseInt(token.style.left);
        const oldTop = parseInt(token.style.top);
        const moved = Math.abs(oldLeft - left) > 2 || Math.abs(oldTop - top) > 2;
        token.style.left = left + 'px';
        token.style.top = top + 'px';
        // Add/remove current player glow
        token.classList.toggle('current-player', pi === gameState.currentPlayer);
        if(moved) {
          token.classList.remove('token-moving');
          void token.offsetWidth; // force reflow
          token.classList.add('token-moving');
        }
        usedTokens.add(String(pi));
      } else {
        token = document.createElement('div');
        token.className = 'token-on-board' + (pi === gameState.currentPlayer ? ' current-player' : '');
        token.dataset.playerIdx = pi;
        const pColor = PLAYER_COLORS[pi] || '#888';
        token.style.background = pColor;
        token.style.setProperty('--token-color', pColor);
        token.style.left = left + 'px';
        token.style.top = top + 'px';
        board.appendChild(token);
        usedTokens.add(String(pi));
      }
    });
  });

  // Remove tokens for bankrupt/removed players
  Object.entries(existingTokens).forEach(([idx, token]) => {
    if(!usedTokens.has(idx)) token.remove();
  });
}

function renderBoard() {

          bar.style.setProperty('--bar-color', playerColor);

        }
      } else {

        bar.style.setProperty('--bar-color', cell.color ? COLORS[cell.color] : 'rgba(255,255,255,0.1)');
        bar.innerHTML = `<span class="bar-text">${cell.price}${COOKIE_ICON}</span>`;
        bar.classList.remove('owned');

        el.style.filter = '';
      }
    }

    // Mortgage indicator
    const oldM = el.querySelector('.mortgage-ind');
    if(oldM) oldM.remove();
    if(prop.mortgaged && prop.owner >= 0) {
      const md = document.createElement('div');
      md.className = 'mortgage-ind';
      md.style.cssText = `position:absolute;bottom:2px;right:2px;font-size:7px;z-index:2;background:rgba(233,69,96,0.8);color:#fff;padding:1px 3px;border-radius:3px;font-weight:700;`;
      md.textContent = 'MTG';
      el.appendChild(md);
    }

    // Update JACKPOT points display
    if(i === 20) {
      const jpEl = document.getElementById('jackpot-points');
      if(jpEl) {

        jpEl.textContent = pot.toLocaleString();

    // House indicators

    if(prop.houses > 0 && cell.type === 'property') {
      const hd = document.createElement('div');

      hd.style.cssText = `position:absolute;bottom:2px;left:2px;font-size:8px;z-index:2;`;
      hd.textContent = prop.houses >= 5 ? '🏨' : '🏠'.repeat(prop.houses);
