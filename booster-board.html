// Build a single face element for a cube side
function diceFaceDotsHTML(val) {
  const dots = Array(val).fill('<div class="dice-dot"></div>').join('');
  return dots;
}

// Build a full 3D die cube showing the desired value on the front-top visible face
function diceCubeHTML(showVal, extraClass) {
  // Standard die: opposite faces sum to 7
  // Face layout: front=1, back=6, right=3, left=4, top=2, bottom=5
  const faces = [
    { pos: 'f-front',  val: 1 },
    { pos: 'f-back',   val: 6 },
    { pos: 'f-right',  val: 3 },
    { pos: 'f-left',   val: 4 },
    { pos: 'f-top',    val: 2 },
    { pos: 'f-bottom', val: 5 },
  ];
  const facesHTML = faces.map(f =>
    `<div class="dice-face ${f.pos}" data-val="${f.val}">${diceFaceDotsHTML(f.val)}</div>`
  ).join('');

  // Rotation to bring desired value to front-facing position
  // Isometric view is rotateX(20deg) rotateY(-18deg) — front face is the primary visible one
  const ROT = {
    1: 'rotateX(0deg) rotateY(0deg)',         // front=1 already facing camera
    2: 'rotateX(-90deg)',                      // top=2 → front (tilt backward)
    3: 'rotateY(-90deg)',                      // right=3 → front (turn left)
    4: 'rotateY(90deg)',                       // left=4 → front (turn right)
    5: 'rotateX(90deg)',                       // bottom=5 → front (tilt forward)
    6: 'rotateY(180deg)',                      // back=6 → front (flip around)
  };
  const rot = ROT[showVal] || ROT[1];

  return `<div class="dice-iso"><div class="dice-cube ${extraClass || ''}" style="transform:${rot};--dice-rot:${rot}">${facesHTML}</div></div>`;
}

function diceSceneHTML(cube1, cube2) {
  return `<div class="dice-scene">${cube1}${cube2}</div>`;
}

let diceRolling = false;
let diceRollTimer = null;
function animateDiceRoll(d1, d2, callback) {
  const diceDiv = document.getElementById('hud-dice');
  diceRolling = true;

  // Show spinning cubes
  diceDiv.innerHTML = diceSceneHTML(diceCubeHTML(1, 'rolling'), diceCubeHTML(1, 'rolling'));

  // After spin duration, land on final values
  diceRollTimer = setTimeout(() => {
    diceDiv.innerHTML = diceSceneHTML(diceCubeHTML(d1), diceCubeHTML(d2));
    diceRolling = false;
    if(callback) setTimeout(callback, 300);
  }, 700);
}

function renderActionPanel() {
  const hud = document.getElementById('center-hud');
  const hudPlayer = document.getElementById('hud-player');
  const hudPlayerName = document.getElementById('hud-player-name');
  const msg = document.getElementById('hud-msg');
  const btns = document.getElementById('hud-buttons');
  const diceDiv = document.getElementById('hud-dice');

  const isMyTurn = gameState.currentPlayer === myPlayerIndex;
  const cp = gameState.players[gameState.currentPlayer];

  // Show current player emoji and name large in center
  const cpColor = PLAYER_COLORS[gameState.currentPlayer] || '#888';
  hudPlayer.innerHTML = `<div style="width:50px;height:50px;border-radius:50%;background:${cpColor};border:3px solid rgba(255,255,255,0.6);box-shadow:0 0 16px ${cpColor};margin:0 auto"></div>`;
  hudPlayerName.textContent = cp?.name || '';

  // Truncate long messages for the HUD
  const rawMsg = gameState.message || '';
  msg.textContent = rawMsg.length > 80 ? rawMsg.slice(0, 77) + '...' : rawMsg;

  // Dice display (don't overwrite during roll animation)
  if(!diceRolling) {
    if(gameState.lastDice[0] > 0) {
      // Show landed dice
      diceDiv.innerHTML = diceSceneHTML(diceCubeHTML(gameState.lastDice[0]), diceCubeHTML(gameState.lastDice[1]));
    } else if(gameState.phase === 'roll') {
      // Show idle floating dice before roll
      if(!diceDiv.querySelector('.dice-cube.idle')) {
        const r1 = Math.floor(Math.random()*6)+1;
        const r2 = Math.floor(Math.random()*6)+1;
        diceDiv.innerHTML = diceSceneHTML(diceCubeHTML(r1, 'idle'), diceCubeHTML(r2, 'idle'));
      }
    } else {
      diceDiv.innerHTML = '';
    }
  }

  btns.innerHTML = '';

  // Auto-minimize when not your turn, full opacity when it is
  if(!isMyTurn || cp?.bankrupt) {
    hud.classList.add('minimized');
    if(!cp?.bankrupt) {
      msg.textContent = `${cp?.name}'s turn...`;
    }
    return;
  }
  hud.classList.remove('minimized');

  const me = gameState.players[myPlayerIndex];

  if(gameState.phase === 'roll') {
    if(me.inJail) {
      addBtn(`Pay 50${COOKIE_ICON}`, 'btn-pay', () => sendAction('payJail'));
      if(me.jailCards > 0) addBtn('Use Card', 'btn-buy', () => sendAction('useJailCard'));
      addBtn('Roll Doubles', 'btn-roll', () => sendAction('rollJail'));
    } else {
      addBtn('🎲 Roll', 'btn-roll', () => sendAction('roll'));
    }
  } else if(gameState.phase === 'postRoll') {
    const ta = gameState.turnActions;
    if(ta.canBuy) {
      const cell = BOARD[me.position];
      const canAfford = me.money >= cell.price;
      const buyBtn = addBtn(`Buy ${cell.price}${COOKIE_ICON}`, 'btn-buy', () => sendAction('buy'));
      if(!canAfford) { buyBtn.disabled = true; buyBtn.title = 'Not enough 🍪 — mortgage or trade to raise funds'; }
      addBtn('Pass', 'btn-end', () => sendAction('passBuy'));
    }
    if(ta.canBuildAny) {
      addBtn('Build', 'btn-buy', () => sendAction('buildMenu'));
    }
    const inDebt = me.money < 0;
    if(gameState.doublesCount > 0 && !me.inJail) {
      const rollBtn = addBtn('🎲 Roll Again!', 'btn-roll', () => sendAction('roll'));
      if(inDebt) { rollBtn.disabled = true; rollBtn.title = 'Resolve debt first'; }
    } else {
      const endBtn = addBtn('End Turn', 'btn-end', () => sendAction('endTurn'));
      if(inDebt) { endBtn.disabled = true; endBtn.title = 'Resolve debt first — mortgage properties or declare bankruptcy'; }
    }
    if(inDebt) {
      msg.textContent = `⚠️ In debt! Mortgage properties or declare bankruptcy.`;
    }
  } else if(gameState.phase === 'pay') {
    const owed = gameState.turnActions.amountOwed || 0;
    const canPay = me.money >= owed;
    const payBtn = addBtn(`Pay ${owed}${COOKIE_ICON}`, 'btn-pay', () => sendAction('payDebt'));
    if(!canPay) { payBtn.disabled = true; payBtn.title = 'Not enough 🍪 — mortgage properties to raise funds'; }
    msg.textContent = canPay ? `Owe ${owed}🍪` : `⚠️ Need ${owed}🍪 — mortgage properties or declare bankruptcy`;
  }

  // Give Up button removed from HUD — now in the sidebar trade-box
}

function addBtn(text, cls, onclick) {
  const b = document.createElement('button');
  b.className = 'action-btn ' + cls;
  b.innerHTML = text;
  b.onclick = onclick;
  document.getElementById('hud-buttons').appendChild(b);
  return b;
}

function renderLog() {
  if(!gameState) return;
  const el = document.getElementById('hud-log');
  if(!el) return;
  const entries = (gameState.log || []).slice(-15);
  el.innerHTML = entries.map(l => {
    let html = l;
    // Find which player color is in this log entry to show as a dot
    let dotHtml = '';
    for(const c of PLAYER_COLORS) {
      if(html.includes(c)) {
        dotHtml = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0;margin-top:3px"></span>`;
        html = html.split(c).join('');
        break;
      }
    }
    if(!dotHtml) dotHtml = `<span style="display:inline-block;width:8px;height:8px;flex-shrink:0"></span>`;
    return `<div class="log-entry">${dotHtml}<span>${html}</span></div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function renderTurnInfo() {
  const cp = gameState.players[gameState.currentPlayer];
  document.getElementById('turn-info').textContent = cp ? `${cp.name}'s turn` : '';
}

// =============================================
// ACTIONS
// =============================================
function sendAction(action, payload) {
  if(isHost) {
    handlePlayerAction(myPlayerIndex, action, payload);
  } else {
    wsSend({ type:'action', action, payload });
  }
}

function handlePlayerAction(playerIdx, action, payload) {
  if(!isHost) return;

  // Trade actions can come from any player, not just the current player
  if(action === 'tradeOffer') {
    handleTradeOffer(payload);
    return;
  }
  if(action === 'tradeResponse') {
    handleTradeResponse(payload);
    return;
  }

  // Votekick actions can come from any player
  if(action === 'votekickStart') {
    activeVotekick = payload;
    showVotekickModal();
    wsSend({ type:'votekick', vote: activeVotekick });
    checkVotekickResult();
    return;
  }
  if(action === 'votekickVote') {
    if(activeVotekick) {
      activeVotekick.votes[payload.playerIdx] = payload.vote;
      showVotekickModal();
      wsSend({ type:'votekick', vote: activeVotekick });
      checkVotekickResult();
    }
    return;
  }

  // Give up can come from anyone (for themselves)
  if(action === 'giveUp') {
    const gp = gameState.players[playerIdx];
    addLog(`🏳️ ${gp.emoji} ${gp.name} gave up!`);
    doBankrupt(playerIdx, -1);
    broadcastState();
    renderGame();
    return;
  }

  if(playerIdx !== gameState.currentPlayer && action !== 'payDebt') return;

  const p = gameState.players[playerIdx];
  if(p.bankrupt) return;

  switch(action) {
    case 'roll': doRoll(playerIdx); return; // doRoll handles its own broadcastState/renderGame after animation
    case 'buy': doBuy(playerIdx); break;
    case 'buildHouse': if(payload && payload.cellIdx !== undefined) buildHouse(payload.cellIdx); return;
    case 'mortgage': if(payload && payload.cellIdx !== undefined) doMortgage(payload.cellIdx); break;
    case 'unmortgage': if(payload && payload.cellIdx !== undefined) doUnmortgage(payload.cellIdx); break;
    case 'passBuy': gameState.turnActions.canBuy = false; gameState.message = 'Passed on buying.'; gameState.phase = 'postRoll'; break;
    case 'endTurn': doEndTurn(playerIdx); break;
    case 'payDebt': doPayDebt(playerIdx); break;
    case 'payJail': doPayJail(playerIdx); break;
    case 'useJailCard': doUseJailCard(playerIdx); break;
    case 'rollJail': doRollJail(playerIdx); return; // doRollJail handles its own broadcastState/renderGame after animation
  }

  broadcastState();
  renderGame();
}

function doRoll(pi) {
  const p = gameState.players[pi];
  const d1 = Math.floor(Math.random()*6)+1;
  const d2 = Math.floor(Math.random()*6)+1;
  const total = d1 + d2;
  const doubles = d1 === d2;

  // Disable buttons during animation
  gameState.phase = 'rolling';
  renderGame();

  // Start dice animation, then process result
  animateDiceRoll(d1, d2, () => {
    gameState.lastDice = [d1, d2];

    if(doubles) {
      gameState.doublesCount++;
      if(gameState.doublesCount >= 3) {
        addLog(`${p.emoji} ${p.name} rolled doubles 3 times - Go to Jail!`);
        sendToJail(pi);
        gameState.phase = 'postRoll';
        gameState.doublesCount = 0;
        broadcastState();
        renderGame();
        return;
      }
    } else {
      gameState.doublesCount = 0;
    }

    // Move
    const oldPos = p.position;
    p.position = (p.position + total) % 40;
    if(p.position < oldPos && p.position !== 0) {
      p.money += 200;
      addLog(`${p.emoji} ${p.name} passed GO! +200🍪`);
    }

    addLog(`${p.emoji} ${p.name} rolled ${d1}+${d2}=${total}, landed on ${BOARD[p.position].name}`);
    gameState.message = '';

    // Handle landing
    handleLanding(pi);
    broadcastState();
    renderGame();
  });
}

function handleLanding(pi) {
  const p = gameState.players[pi];
  const cell = BOARD[p.position];
  const prop = gameState.properties[p.position];

  gameState.turnActions = {};
  gameState.phase = 'postRoll';

  // SPECIAL RULE: Yahu seizure on special properties
  if(cell.special === 'yahu') {
    const ownedProps = [];
    gameState.properties.forEach((pr, idx) => {
      if(pr.owner === pi) ownedProps.push(idx);
    });
    if(ownedProps.length > 0) {
      const randomIdx = ownedProps[Math.floor(Math.random() * ownedProps.length)];
      gameState.properties[randomIdx].owner = -1;
      gameState.properties[randomIdx].houses = 0;
      const lostName = BOARD[randomIdx].name;
      const propArrayIdx = p.properties.indexOf(randomIdx);
      if(propArrayIdx >= 0) p.properties.splice(propArrayIdx, 1);
      addLog(`⚠️ YAHU SEIZURE! ${p.emoji} ${p.name} lost ${lostName} to Yahu!`);
      gameState.message = `⚠️ Yahu seized ${lostName}!`;
    }
  }

  switch(cell.type) {
    case 'property':
    case 'railroad':
    case 'utility':
      if(prop.owner === -1) {
        // Unowned - offer to buy (even if can't afford yet — player can mortgage/trade first)
        gameState.turnActions.canBuy = true;
        gameState.message = `Buy ${cell.name} for ${cell.price} cookies?`;
      } else if(prop.owner !== pi && !prop.mortgaged) {
        // Check if owner is in jail — no rent collection while jailed
        const owner = gameState.players[prop.owner];
        if(owner && owner.inJail) {
          addLog(`${owner.emoji} ${owner.name} is in jail — no rent collected on ${cell.name}`);
          gameState.message = `${owner.name} is in jail, no rent owed!`;
        } else {
          // Pay rent
          let rent = calculateRent(p.position, prop);
          gameState.turnActions.amountOwed = rent;
          gameState.turnActions.owedTo = prop.owner;
          gameState.phase = 'pay';
          gameState.message = `Owe ${rent} cookies rent to ${gameState.players[prop.owner].name}!`;
        }
      }
      break;

    case 'tax':
      gameState.turnActions.amountOwed = cell.amount;
      gameState.turnActions.owedTo = -1; // bank / free parking pot
      gameState.phase = 'pay';
      gameState.message = `${cell.desc}`;
      break;

    case 'chance':
      doCard(pi, CHANCE_CARDS, 'chance');
      return; // doCard handles broadcastState after delay

    case 'chest':
      doCard(pi, CHEST_CARDS, 'chest');
      return; // doCard handles broadcastState after delay

    case 'corner':
      if(p.position === 0) {
        p.money += 200;
        addLog(`${p.emoji} ${p.name} landed on GO! +200🍪`);
      } else if(p.position === 20) {
        // Free parking - collect pot
        if(gameState.freeParkingPot > 0) {
          p.money += gameState.freeParkingPot;
          addLog(`${p.emoji} ${p.name} collected ${gameState.freeParkingPot}🍪 from Free Parking!`);
          gameState.message = `Collected ${gameState.freeParkingPot}🍪 from the pot!`;
          gameState.freeParkingPot = 0;
        }
      } else if(p.position === 30) {
        sendToJail(pi);
      }
      break;
  }
}

function calculateRent(cellIdx, prop) {
  const cell = BOARD[cellIdx];
  if(cell.type === 'railroad') {
    // Only count non-mortgaged railroads
    const railOwned = [5,15,25,35].filter(r => gameState.properties[r].owner === prop.owner && !gameState.properties[r].mortgaged).length;
    return [25,50,100,200][railOwned-1] || 25;
  }
  if(cell.type === 'utility') {
    // Only count non-mortgaged utilities
    const utilOwned = [12,28].filter(u => gameState.properties[u].owner === prop.owner && !gameState.properties[u].mortgaged).length;
    const diceTotal = gameState.lastDice[0] + gameState.lastDice[1];
    return utilOwned === 2 ? diceTotal * 10 : diceTotal * 4;
  }
  // Property
  if(prop.houses === 0) {
    // Check if owner has full color group (unmortgaged only for double rent)
    const group = BOARD.filter(c => c.group === cell.group).map(c => c.id);
    const ownsAll = group.every(id => gameState.properties[id].owner === prop.owner && !gameState.properties[id].mortgaged);
    return ownsAll ? cell.rent[0] * 2 : cell.rent[0];
  }
  return cell.rent[prop.houses] || cell.rent[0];
}

function showCardOverlay(playerName, playerEmoji, cardText, deckType) {
  const overlay = document.getElementById('card-overlay');
  const isChance = deckType === 'chance';
  const headerClass = isChance ? 'chance-header' : 'chest-header';
  const barClass = isChance ? 'chance-bar' : 'chest-bar';
  const deckLabel = isChance ? 'Chance' : 'Golden Scar';
  const icon = isChance ? '❓' : '🎁';

  overlay.innerHTML = `
    <div class="card-draw" style="position:relative">
      <div class="card-draw-header ${headerClass}">${deckLabel}</div>
      <div class="card-draw-body">
        <div class="card-draw-icon">${icon}</div>
        <div>
          <div>${cardText}</div>
          <div class="card-draw-player"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${playerEmoji};vertical-align:middle;margin-right:3px"></span>${playerName}</div>
        </div>
      </div>
      <div class="card-draw-timer"><div class="card-draw-timer-bar ${barClass}"></div></div>
    </div>
  `;
  overlay.classList.add('visible');
}

function hideCardOverlay() {
  const overlay = document.getElementById('card-overlay');
  overlay.classList.remove('visible');
  overlay.innerHTML = '';
}

function doCard(pi, deck, deckType) {
  const p = gameState.players[pi];
  const card = deck[Math.floor(Math.random() * deck.length)];
  addLog(`🃏 ${p.emoji} ${p.name}: "${card.text}"`);
  gameState.message = card.text;

  // Show the card to all players and broadcast immediately so everyone sees it
  gameState.cardDisplay = { playerName: p.name, playerEmoji: p.emoji, cardText: card.text, deckType: deckType };
  if(isHost) { broadcastState(); }
  renderGame();
  showCardOverlay(p.name, p.emoji, card.text, deckType);

  // Apply the card effect after a delay so players can read it
  const CARD_DELAY = 3000;
  setTimeout(() => {
    hideCardOverlay();
    delete gameState.cardDisplay;
    applyCardEffect(pi, card);
    if(isHost) { broadcastState(); }
    renderGame();
  }, CARD_DELAY);
}

function applyCardEffect(pi, card) {
  const p = gameState.players[pi];
  switch(card.action) {
    case 'receive':
      p.money += card.value;
      break;
    case 'pay':
      if(p.money >= card.value) {
        p.money -= card.value;
        gameState.freeParkingPot += card.value;
      } else {
        gameState.turnActions.amountOwed = card.value;
        gameState.turnActions.owedTo = -1;
        gameState.phase = 'pay';
      }
      break;
    case 'moveTo':
      const oldPos = p.position;
      p.position = card.value;
      if(card.value < oldPos) { p.money += 200; addLog(`${p.emoji} passed GO! +200🍪`); }
      handleLanding(pi);
      return;
    case 'moveBack':
      p.position = (p.position - card.value + 40) % 40;
      handleLanding(pi);
      return;
    case 'jail':
      sendToJail(pi);
      break;
    case 'jailCard':
      p.jailCards++;
      break;
    case 'payAll': {
      const others = gameState.players.filter((_, i) => i !== pi && !_.bankrupt);
      const totalPay = card.value * others.length;
      p.money -= totalPay;
      others.forEach(o => o.money += card.value);
      if(p.money < 0) {
        gameState.phase = 'postRoll';
        gameState.message = `⚠️ In debt (${p.money}🍪)! Mortgage properties or declare bankruptcy.`;
        addLog(`⚠️ ${p.emoji} ${p.name} is in debt! Owes ${Math.abs(p.money)}🍪`);
      }
      break;
    }
    case 'collectAll':
      gameState.players.forEach((o, i) => {
        if(i !== pi && !o.bankrupt) {
          o.money -= card.value;
          p.money += card.value;
        }
      });
      break;
    case 'payPerHouse': {
      let houseCount = 0;
      gameState.properties.forEach(pr => { if(pr.owner === pi) houseCount += pr.houses; });
      const houseCost = houseCount * card.value;
      if(p.money >= houseCost) { p.money -= houseCost; gameState.freeParkingPot += houseCost; }
      else {
        gameState.turnActions.amountOwed = houseCost;
        gameState.turnActions.owedTo = -1;
        gameState.phase = 'pay';
      }
      break;
    }
    case 'payRepairs': {
      let rHouses = 0, rHotels = 0;
      gameState.properties.forEach(pr => {
        if(pr.owner === pi) {
          if(pr.houses >= 5) rHotels++;
          else rHouses += pr.houses;
        }
      });
      const repairCost = rHouses * card.value + rHotels * (card.hotelValue || card.value * 4);
      addLog(`🔧 ${p.emoji} ${p.name} pays ${repairCost}🍪 for repairs (${rHouses} houses, ${rHotels} hotels)`);
      if(p.money >= repairCost) { p.money -= repairCost; gameState.freeParkingPot += repairCost; }
      else {
        gameState.turnActions.amountOwed = repairCost;
        gameState.turnActions.owedTo = -1;
        gameState.phase = 'pay';
      }
      break;
    }
    case 'nearestRailroad': {
      const railroads = [5, 15, 25, 35];
      let nearest = railroads.find(r => r > p.position);
      if(!nearest) nearest = railroads[0]; // wrap around
      const oldPosR = p.position;
      p.position = nearest;
      if(nearest <= oldPosR) { p.money += 200; addLog(`${p.emoji} passed GO! +200🍪`); }
      const rrProp = gameState.properties[nearest];
      if(rrProp.owner >= 0 && rrProp.owner !== pi && !rrProp.mortgaged) {
        const rrOwner = gameState.players[rrProp.owner];
        let rrCount = [5,15,25,35].filter(r => gameState.properties[r].owner === rrProp.owner).length;
        const rrRent = [25,50,100,200][rrCount - 1] * 2; // double rent
        addLog(`🚇 ${p.emoji} ${p.name} pays ${rrOwner.name} double BART fare: ${rrRent}🍪`);
        if(p.money >= rrRent) {
          p.money -= rrRent;
          rrOwner.money += rrRent;
        } else {
          gameState.turnActions.amountOwed = rrRent;
          gameState.turnActions.owedTo = rrProp.owner;
          gameState.phase = 'pay';
        }
      } else if(rrProp.owner === -1) {
        gameState.turnActions.canBuy = true;
        gameState.message = `Buy ${BOARD[nearest].name} for ${BOARD[nearest].price} cookies?`;
      }
      break;
    }
    case 'nearestUtility': {
      const utilities = [12, 28];
      let nearestU = utilities.find(u => u > p.position);
      if(!nearestU) nearestU = utilities[0]; // wrap around
      const oldPosU = p.position;
      p.position = nearestU;
      if(nearestU <= oldPosU) { p.money += 200; addLog(`${p.emoji} passed GO! +200🍪`); }
      const utilProp = gameState.properties[nearestU];
      if(utilProp.owner >= 0 && utilProp.owner !== pi && !utilProp.mortgaged) {
        const utilOwner = gameState.players[utilProp.owner];
        const diceRoll = Math.floor(Math.random() * 6) + 1 + Math.floor(Math.random() * 6) + 1;
        const utilRent = diceRoll * 10;
        addLog(`⚡ ${p.emoji} ${p.name} rolled ${diceRoll} — pays ${utilOwner.name} ${utilRent}🍪 utility bill`);
        if(p.money >= utilRent) {
          p.money -= utilRent;
          utilOwner.money += utilRent;
        } else {
          gameState.turnActions.amountOwed = utilRent;
          gameState.turnActions.owedTo = utilProp.owner;
          gameState.phase = 'pay';
        }
      } else if(utilProp.owner === -1) {
        gameState.turnActions.canBuy = true;
        gameState.message = `Buy ${BOARD[nearestU].name} for ${BOARD[nearestU].price} cookies?`;
      }
      break;
    }
  }
}

function sendToJail(pi) {
  const p = gameState.players[pi];
  p.position = 10;
  p.inJail = true;
  p.jailTurns = 0;
  gameState.doublesCount = 0;
  addLog(`🔒 ${p.emoji} ${p.name} went to Jail!`);
  gameState.message = `${p.name} is in Jail!`;
}

function doBuy(pi) {
  const p = gameState.players[pi];
  const cell = BOARD[p.position];
  if(p.money < cell.price) return;

  p.money -= cell.price;
  gameState.properties[p.position].owner = pi;
  p.properties.push(p.position);
  gameState.turnActions.canBuy = false;

  addLog(`${p.emoji} ${p.name} bought ${cell.name} for ${cell.price}🍪`);
  gameState.message = `Bought ${cell.name}!`;
}

function doPayDebt(pi) {
  const p = gameState.players[pi];
  const owed = gameState.turnActions.amountOwed || 0;
  const to = gameState.turnActions.owedTo;

  if(p.money >= owed) {
    p.money -= owed;
    if(to >= 0) {
      gameState.players[to].money += owed;
    } else {
      gameState.freeParkingPot += owed;
    }
    gameState.phase = 'postRoll';
    gameState.message = `Paid ${owed}🍪`;
    addLog(`${p.emoji} ${p.name} paid ${owed}🍪`);
  } else {
    // Not enough — go into debt, move to postRoll so player can mortgage/trade
    p.money -= owed;
    if(to >= 0) {
      gameState.players[to].money += owed;
    } else {
      gameState.freeParkingPot += owed;
    }
    gameState.phase = 'postRoll';
    gameState.message = `⚠️ In debt (${p.money}🍪)! Mortgage properties or declare bankruptcy.`;
    addLog(`⚠️ ${p.emoji} ${p.name} is in debt! Owes ${Math.abs(p.money)}🍪`);
  }
}

function doBankrupt(pi, creditor) {
  const p = gameState.players[pi];
  p.bankrupt = true;
  addLog(`💀 ${p.emoji} ${p.name} went bankrupt!`);

  // Transfer properties
  gameState.properties.forEach((pr, idx) => {
    if(pr.owner === pi) {
      pr.owner = creditor >= 0 ? creditor : -1;
      pr.houses = 0;
      // If going to bank, unmortgage; if going to creditor, keep mortgage status
      if(creditor < 0) pr.mortgaged = false;
      if(creditor >= 0) gameState.players[creditor].properties.push(idx);
    }
  });
  if(creditor >= 0) gameState.players[creditor].money += p.money;
  p.money = 0;
  p.properties = [];

  // Check game over
  const alive = gameState.players.filter(pl => !pl.bankrupt);
  if(alive.length <= 1) {
    gameState.phase = 'gameOver';
    const winner = alive[0];
    gameState.message = `🏆 ${winner.emoji} ${winner.name} WINS THE GAME!`;
    addLog(`🏆 ${winner.emoji} ${winner.name} is the last one standing!`);
  } else {
    doEndTurn(pi);
  }
}

function doPayJail(pi) {
  const p = gameState.players[pi];
  if(p.money >= 50) {
    p.money -= 50;
    p.inJail = false;
    p.jailTurns = 0;
    addLog(`${p.emoji} ${p.name} paid 50🍪 to leave jail`);
    gameState.phase = 'roll';
    gameState.message = 'Free! Roll the dice.';
  }
}

function doUseJailCard(pi) {
  const p = gameState.players[pi];
  if(p.jailCards > 0) {
    p.jailCards--;
    p.inJail = false;
    p.jailTurns = 0;
    addLog(`${p.emoji} ${p.name} used a Get Out of Jail card`);
    gameState.phase = 'roll';
    gameState.message = 'Free! Roll the dice.';
  }
}

function doRollJail(pi) {
  const p = gameState.players[pi];
  const d1 = Math.floor(Math.random()*6)+1;
  const d2 = Math.floor(Math.random()*6)+1;

  // Disable buttons during animation
  gameState.phase = 'rolling';
  renderGame();

  animateDiceRoll(d1, d2, () => {
    gameState.lastDice = [d1, d2];

    if(d1 === d2) {
      p.inJail = false;
      p.jailTurns = 0;
      addLog(`${p.emoji} ${p.name} rolled doubles (${d1},${d2}) and escaped jail!`);
      p.position = (10 + d1 + d2) % 40;
      gameState.message = `Doubles! Free from jail!`;
      handleLanding(pi);
    } else {
      p.jailTurns++;
      if(p.jailTurns >= 3) {
        p.money -= 50;
        p.inJail = false;
        p.jailTurns = 0;
        addLog(`${p.emoji} ${p.name} failed 3 times, paid 50🍪`);
        gameState.phase = 'postRoll';
        gameState.message = 'Paid 50🍪 after 3 failed attempts.';
      } else {
        addLog(`${p.emoji} ${p.name} didn't roll doubles (${d1},${d2}), still in jail`);
        gameState.phase = 'postRoll';
        gameState.doublesCount = 0;
        gameState.message = `No doubles. Still in jail (attempt ${p.jailTurns}/3)`;
      }
    }
    broadcastState();
    renderGame();
  });
}

function doEndTurn(pi) {
  const p = gameState.players[pi];
  if(p.money < 0) {
    gameState.message = '⚠️ Cannot end turn while in debt! Mortgage properties or declare bankruptcy.';
    return;
  }
  gameState.doublesCount = 0;
  gameState.turnActions = {};
  gameState.lastDice = [0,0];

  // Next alive player
  let next = (pi + 1) % gameState.players.length;
  let safety = 0;
  while(gameState.players[next].bankrupt && safety < 10) {
    next = (next + 1) % gameState.players.length;
    safety++;
  }
  gameState.currentPlayer = next;
  gameState.phase = 'roll';
  const np = gameState.players[next];
  gameState.message = `${np.name}'s turn - Roll the dice!`;
}

// =============================================
// BOT AI
// =============================================
function checkBotTurn() {
  if(!isHost || !gameState || gameState.phase === 'waiting' || gameState.phase === 'gameOver') return;
  const p = gameState.players[gameState.currentPlayer];
  if(!p || !p.isBot || p.bankrupt) return;

  // Delay bot actions slightly for a natural feel
  setTimeout(() => {
    if(!gameState) return;
    const pi = gameState.currentPlayer;
    const bp = gameState.players[pi];
    if(!bp || !bp.isBot) return;

    if(gameState.phase === 'roll') {
      if(bp.inJail) {
        // Try to roll out of jail
        handlePlayerAction(pi, 'rollJail');
      } else {
        handlePlayerAction(pi, 'roll');
      }
    } else if(gameState.phase === 'postRoll') {
      if(gameState.turnActions.canBuy) {
        // Buy if we have enough money and it's affordable (keep at least 200 reserve)
        const cell = BOARD[bp.position];
        if(bp.money - cell.price >= 200) {
          handlePlayerAction(pi, 'buy');
        } else {
          handlePlayerAction(pi, 'passBuy');
        }
      }
      // After buying/passing, end turn
      setTimeout(() => {
        if(gameState && gameState.currentPlayer === pi && gameState.phase === 'postRoll') {
          handlePlayerAction(pi, 'endTurn');
        }
      }, 800);
    } else if(gameState.phase === 'pay') {
      // If bot can't afford the debt, try mortgaging properties first
      const owed = gameState.turnActions.amountOwed || 0;
      if(bp.money < owed) {
        botTryMortgage(pi, owed);
      }
      setTimeout(() => {
        if(gameState && gameState.currentPlayer === pi && gameState.phase === 'pay') {
          handlePlayerAction(pi, 'payDebt');
        }
      }, 600);
    }
  }, 1200);
}

function botTryMortgage(pi, amountNeeded) {
  // Bot mortgages properties (cheapest first) until it has enough money
  const bp = gameState.players[pi];
  const mortgageable = [];
  gameState.properties.forEach((pr, idx) => {
    if(pr.owner === pi && !pr.mortgaged && pr.houses === 0 && BOARD[idx].price) {
      mortgageable.push({ idx, value: Math.floor(BOARD[idx].price / 2) });
    }
  });
  // Sort by value ascending — mortgage cheapest first
  mortgageable.sort((a, b) => a.value - b.value);
  for(const m of mortgageable) {
    if(bp.money >= amountNeeded) break;
    doMortgage(m.idx);
  }
}

  }

  // Build house button for owner
  let footer = '';
  const isMine = prop.owner === myPlayerIndex;
  if(cell.type === 'property' && isMine && gameState.currentPlayer === myPlayerIndex && !prop.mortgaged) {
    const group = BOARD.filter(c => c.group === cell.group).map(c => c.id);
    const ownsAll = group.every(id => gameState.properties[id].owner === myPlayerIndex);
    if(ownsAll && prop.houses < 5 && gameState.players[myPlayerIndex].money >= cell.house) {

function closePropPopup() {
  document.getElementById('prop-popup').classList.remove('show');
}

function buildHouse(idx) {
  if(!isHost) {
    wsSend({ type:'action', action:'buildHouse', payload:{ cellIdx: idx }});
    return;
  }
  const cell = BOARD[idx];
  const prop = gameState.properties[idx];
  const p = gameState.players[prop.owner];
  if(p.money >= cell.house && prop.houses < 5) {
    p.money -= cell.house;
    prop.houses++;
    addLog(`${p.emoji} ${p.name} built on ${cell.name} (${prop.houses >= 5 ? 'Hotel' : prop.houses + ' houses'})`);
    broadcastState();
    renderGame();
    showPropertyInfo(idx); // Refresh popup
  }
}

// =============================================
// MORTGAGE SYSTEM
// =============================================
function doMortgage(idx) {
  if(!isHost) {
    wsSend({ type:'action', action:'mortgage', payload:{ cellIdx: idx }});
    return;
  }
  const cell = BOARD[idx];
  const prop = gameState.properties[idx];
  if(prop.owner < 0 || prop.mortgaged) return;
  if(prop.houses > 0) return; // Must sell houses first

  const mortgageValue = Math.floor(cell.price / 2);
  const p = gameState.players[prop.owner];
  prop.mortgaged = true;
  p.money += mortgageValue;
  addLog(`🏦 ${p.emoji} ${p.name} mortgaged ${cell.name} for ${mortgageValue}🍪`);
  broadcastState();
  renderGame();
  showPropertyInfo(idx); // Refresh popup
}

function doUnmortgage(idx) {
  if(!isHost) {
    wsSend({ type:'action', action:'unmortgage', payload:{ cellIdx: idx }});
    return;
  }
  const cell = BOARD[idx];
  const prop = gameState.properties[idx];
  if(prop.owner < 0 || !prop.mortgaged) return;

  const unmortgageCost = Math.floor(cell.price / 2 * 1.1); // 10% interest
  const p = gameState.players[prop.owner];
  if(p.money < unmortgageCost) return;

  prop.mortgaged = false;
  p.money -= unmortgageCost;
  addLog(`🏦 ${p.emoji} ${p.name} unmortgaged ${cell.name} for ${unmortgageCost}🍪`);
  broadcastState();
  renderGame();
  showPropertyInfo(idx); // Refresh popup
}

// CHAT SYSTEM

let chatMessages = [];
let unreadCount = 0;
let chatCollapsed = false;

function toggleChat() {
  const panel = document.getElementById('chat-panel');
  chatCollapsed = !chatCollapsed;
  panel.classList.toggle('collapsed', chatCollapsed);
  if(!chatCollapsed) {
    unreadCount = 0;
    updateChatBadge();
    scrollChatToBottom();
  }
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text || myPlayerIndex < 0 || !gameState) return;
  input.value = '';

  const msg = {
    from: myPlayerIndex,
    text: text,
    ts: Date.now(),
  };

  if(isHost) {
    // Host adds and broadcasts
    receiveChatMessage(msg);
    wsSend({ type:'chat', msg });
  } else {
    // Guest sends to host for relay
    wsSend({ type:'chat', msg });
    // Also show locally immediately
    receiveChatMessage(msg);
  }
}

function receiveChatMessage(msg) {
  chatMessages.push(msg);
  if(chatMessages.length > 80) chatMessages.shift();

  renderChatMessage(msg);

  if(chatCollapsed && msg.from !== myPlayerIndex) {
    unreadCount++;
    updateChatBadge();
  }
}

function renderChatMessage(msg) {
  const body = document.getElementById('chat-body');
  if(!body) return;

  const player = gameState?.players[msg.from];
  const isMine = msg.from === myPlayerIndex;

  const div = document.createElement('div');
  div.className = 'chat-msg' + (isMine ? ' mine' : '');

  div.innerHTML = `
    <div class="chat-msg-author" style="color:${isMine ? '#e94560' : '#6b9dc8'}">${player ? playerDot(msg.from) + ' ' + player.name : 'Unknown'}</div>
    <div class="chat-msg-text">${escapeHtml(msg.text)}</div>
  `;

  body.appendChild(div);
  scrollChatToBottom();
}

function renderAllChat() {
  const body = document.getElementById('chat-body');
  if(!body) return;
  body.innerHTML = '';
  chatMessages.forEach(msg => renderChatMessage(msg));
}

function scrollChatToBottom() {
  const body = document.getElementById('chat-body');
  if(body) requestAnimationFrame(() => { body.scrollTop = body.scrollHeight; });
}

function updateChatBadge() {
  const badge = document.getElementById('chat-badge');
  if(!badge) return;
  if(unreadCount > 0) {
    badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// =============================================
// VOTEKICK SYSTEM
// =============================================
let activeVotekick = null; // { targetIdx, initiatorIdx, votes: { playerIdx: true/false }, needed }

function initiateVotekick(targetIdx) {
  if(!gameState || myPlayerIndex < 0) return;
  const target = gameState.players[targetIdx];
  if(!target || target.bankrupt) return;

  // Can't kick if only 2 alive players
  const alivePlayers = gameState.players.filter(p => !p.bankrupt);
  if(alivePlayers.length <= 2) return;

  const vk = {
    targetIdx,
    initiatorIdx: myPlayerIndex,
    votes: {},
    needed: Math.ceil((alivePlayers.length - 1) / 2), // majority of non-target players
  };
  vk.votes[myPlayerIndex] = true; // initiator auto-votes yes

  if(isHost) {
    activeVotekick = vk;
    wsSend({ type:'votekick', vote: vk });
    showVotekickModal();
    checkVotekickResult();
  } else {
    wsSend({ type:'action', action:'votekickStart', payload: vk });
  }
}

function showVotekickModal() {
  if(!activeVotekick || !gameState) return;
  const modal = document.getElementById('votekick-modal');
  const vk = activeVotekick;
  const target = gameState.players[vk.targetIdx];
  const alive = gameState.players.filter((p, i) => !p.bankrupt && i !== vk.targetIdx);

  let yesCount = 0, noCount = 0, waitCount = 0;
  alive.forEach((p, _) => {
    const realIdx = gameState.players.indexOf(p);
    if(vk.votes[realIdx] === true) yesCount++;
    else if(vk.votes[realIdx] === false) noCount++;
    else waitCount++;
  });

  const alreadyVoted = vk.votes[myPlayerIndex] !== undefined;
  const isTarget = vk.targetIdx === myPlayerIndex;

  let buttonsHtml = '';
  if(isTarget) {
    buttonsHtml = `<div style="color:#888;font-size:0.85em;font-style:italic">A vote is in progress about you...</div>`;
  } else if(alreadyVoted) {
    buttonsHtml = `<div style="color:#888;font-size:0.85em">You voted ${vk.votes[myPlayerIndex] ? '✕ Kick' : '✓ Keep'}. Waiting for others...</div>`;
  } else {
    buttonsHtml = `
      <button class="action-btn btn-pay" onclick="castVotekick(true)">✕ Kick</button>
      <button class="action-btn btn-buy" onclick="castVotekick(false)">✓ Keep</button>
    `;
  }

  modal.innerHTML = `
    <div class="votekick-box">
      <h3>⚠️ Vote to Kick</h3>
      <div class="vk-target">${target.emoji}</div>
      <div class="vk-name">${target.name}</div>
      <div class="vk-desc">Started by ${gameState.players[vk.initiatorIdx]?.emoji} ${gameState.players[vk.initiatorIdx]?.name}<br>Need ${vk.needed} vote${vk.needed>1?'s':''} to kick</div>
      <div class="vk-tally">
        <span class="vk-yes">✕ ${yesCount}</span>
        <span class="vk-no">✓ ${noCount}</span>
        <span class="vk-waiting">⏳ ${waitCount}</span>
      </div>
      <div class="vk-buttons">${buttonsHtml}</div>
    </div>`;
  modal.classList.add('show');
}

function castVotekick(vote) {
  if(!activeVotekick) return;

  if(isHost) {
    activeVotekick.votes[myPlayerIndex] = vote;
    wsSend({ type:'votekick', vote: activeVotekick });
    showVotekickModal();
    checkVotekickResult();
  } else {
    wsSend({ type:'action', action:'votekickVote', payload: { playerIdx: myPlayerIndex, vote } });
  }
}

function checkVotekickResult() {
  if(!activeVotekick || !isHost) return;
  const vk = activeVotekick;
  const alive = gameState.players.filter((p, i) => !p.bankrupt && i !== vk.targetIdx);

  let yesCount = 0, noCount = 0;
  alive.forEach(p => {
    const realIdx = gameState.players.indexOf(p);
    if(vk.votes[realIdx] === true) yesCount++;
    else if(vk.votes[realIdx] === false) noCount++;
  });

  const maxPossibleNo = alive.length - yesCount;

  if(yesCount >= vk.needed) {
    // Kick passes!
    const target = gameState.players[vk.targetIdx];
    addLog(`🚫 ${target.emoji} ${target.name} was voted out!`);
    doBankrupt(vk.targetIdx, -1); // properties go back to Yahu
    activeVotekick = null;
    closeVotekickModal();
    wsSend({ type:'votekickResult', result: 'kicked', targetIdx: vk.targetIdx });
    broadcastState();
    renderGame();
  } else if(maxPossibleNo < vk.needed) {
    // Impossible to pass even if all remaining vote yes — but let it play out
    // Actually check if it's mathematically impossible for yes to win
    const remaining = alive.length - yesCount - noCount;
    if(yesCount + remaining < vk.needed) {
      // Vote fails
      const target = gameState.players[vk.targetIdx];
      addLog(`✅ ${target.emoji} ${target.name} survived the vote!`);
      activeVotekick = null;
      closeVotekickModal();
      wsSend({ type:'votekickResult', result: 'survived', targetIdx: vk.targetIdx });
    }
  }
}

function closeVotekickModal() {
  const modal = document.getElementById('votekick-modal');
  modal.classList.remove('show');
  activeVotekick = null;
}

// =============================================
// GIVE UP (Voluntary Bankrupt)
// =============================================
function confirmGiveUp() {
  if(!gameState || myPlayerIndex < 0) return;
  const me = gameState.players[myPlayerIndex];
  if(me.bankrupt) return;

  const modal = document.getElementById('votekick-modal');
  modal.innerHTML = `
    <div class="votekick-box">
      <h3>🏳️ Give Up?</h3>
      <div class="vk-target">${me.emoji}</div>
      <div class="vk-name">${me.name}</div>
      <div class="vk-desc">All your properties go back to Yahu (bank) and you'll be out of the game. This can't be undone!</div>
      <div class="vk-buttons">
        <button class="action-btn btn-end" onclick="closeVotekickModal()">Cancel</button>
        <button class="action-btn btn-pay" onclick="doGiveUp()">Give Up</button>
      </div>
    </div>`;
  modal.classList.add('show');
}

function doGiveUp() {
  closeVotekickModal();
  if(isHost) {
    const me = gameState.players[myPlayerIndex];
    addLog(`🏳️ ${me.emoji} ${me.name} gave up!`);
    doBankrupt(myPlayerIndex, -1);
    broadcastState();
    renderGame();
  } else {
    wsSend({ type:'action', action:'giveUp', payload: {} });
  }
}

// =============================================
// TRADE LOG SYSTEM
// =============================================
let tradeLog = []; // { id, from, to, offerMoney, requestMoney, offerProps, requestProps, status: 'pending'|'accepted'|'declined', timestamp }
let tradeLogCollapsed = false;
let tradeLogNextId = 1;

function addTradeToLog(trade, status) {
  const entry = {
    id: tradeLogNextId++,
    from: trade.from,
    to: trade.to,
    offerMoney: trade.offerMoney,
    requestMoney: trade.requestMoney,
    offerProps: trade.offerProps || [],
    requestProps: trade.requestProps || [],
    status: status,
    timestamp: Date.now(),
  };
  tradeLog.unshift(entry); // newest first
  if(tradeLog.length > 20) tradeLog.pop();
  renderTradeLog();
  updateTradeLogBadge();
}

function renderTradeLog() {
  const header = document.getElementById('trade-log-header');
  const body = document.getElementById('trade-log-body');
  if(!header || !body || !gameState) return;

  if(tradeLog.length === 0) {
    header.style.display = 'none';
    body.innerHTML = '';
    return;
  }

  header.style.display = 'flex';

  body.innerHTML = tradeLog.map(entry => {
    const fromP = gameState.players[entry.from];
    const toP = gameState.players[entry.to];
    if(!fromP || !toP) return '';

    const statusClass = entry.status;
    const statusText = entry.status === 'pending' ? '⏳ Pending' : entry.status === 'accepted' ? '✅ Accepted' : '❌ Declined';

    let details = [];
    if(entry.offerMoney > 0) details.push(`${fromP.emoji} offers ${entry.offerMoney}🍪`);
    if(entry.requestMoney > 0) details.push(`${fromP.emoji} wants ${entry.requestMoney}🍪`);
    entry.offerProps.forEach(idx => details.push(`${fromP.emoji} offers ${BOARD[idx]?.name || '?'}`));
    entry.requestProps.forEach(idx => details.push(`${fromP.emoji} wants ${BOARD[idx]?.name || '?'}`));

    return `<div class="trade-log-entry" onclick="showTradeLogDetail(${entry.id})">
      <div class="tle-header">
        <span class="tle-players">${fromP.emoji} → ${toP.emoji}</span>
        <span class="tle-status ${statusClass}">${statusText}</span>
      </div>
      <div class="tle-details">${details.slice(0,2).join(' · ') || 'Empty trade'}${details.length > 2 ? ' ...' : ''}</div>
      <button class="tle-dismiss" onclick="event.stopPropagation();dismissTradeLog(${entry.id})" title="Dismiss">✕</button>
    </div>`;
  }).join('');
}

function showTradeLogDetail(entryId) {
  const entry = tradeLog.find(e => e.id === entryId);
  if(!entry || !gameState) return;

  const fromP = gameState.players[entry.from];
  const toP = gameState.players[entry.to];
  if(!fromP || !toP) return;

  const statusClass = entry.status;
  const statusText = entry.status === 'pending' ? '⏳ Pending' : entry.status === 'accepted' ? '✅ Accepted' : '❌ Declined';

  function propList(indices) {
    if(indices.length === 0) return '<div style="color:#555;font-size:0.9em">None</div>';
    return indices.map(idx => {
      const cell = BOARD[idx];
      const color = cell?.color ? COLORS[cell.color] : '#666';
      return `<div style="font-size:0.9em;padding:2px 0"><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${color};margin-right:6px;vertical-align:middle"></span>${cell?.name || '?'} (${cell?.price || 0}🍪)</div>`;
    }).join('');
  }

  const modal = document.getElementById('trade-modal');
  modal.innerHTML = `
    <div class="trade-incoming-box" style="width:420px">
      <h3>📋 Trade Details</h3>
      <div class="trade-header">
        <div class="th-player"><div class="th-emoji">${fromP.emoji}</div><div class="th-name">${fromP.name}</div></div>
        <div class="th-arrow">→</div>
        <div class="th-player"><div class="th-emoji">${toP.emoji}</div><div class="th-name">${toP.name}</div></div>
      </div>
      <div style="text-align:center;padding:8px"><span class="tle-status ${statusClass}" style="font-size:1.1em">${statusText}</span></div>
      <div class="trade-summary" style="display:flex;gap:0">
        <div style="flex:1;padding:12px;border-right:1px solid #2a3a4a">
          <div class="trade-summary-col">
            <h5>${fromP.name} gives</h5>
            ${entry.offerMoney > 0 ? `<div style="color:#f5a623;font-weight:600;font-size:0.9em">${entry.offerMoney}🍪</div>` : ''}
            ${propList(entry.offerProps)}
          </div>
        </div>
        <div style="flex:1;padding:12px">
          <div class="trade-summary-col">
            <h5>${fromP.name} wants</h5>
            ${entry.requestMoney > 0 ? `<div style="color:#f5a623;font-weight:600;font-size:0.9em">${entry.requestMoney}🍪</div>` : ''}
            ${propList(entry.requestProps)}
          </div>
        </div>
      </div>
      <div class="trade-footer">
        <button class="action-btn btn-end" onclick="closeTradeModal()">Close</button>
        <button class="action-btn btn-mortgage" onclick="dismissTradeLog(${entry.id});closeTradeModal()">Dismiss</button>
      </div>
    </div>`;
  modal.classList.add('show');
}

function dismissTradeLog(entryId) {
  tradeLog = tradeLog.filter(e => e.id !== entryId);
  renderTradeLog();
  updateTradeLogBadge();
}

function updateTradeLogStatus(trade, status) {
  // Find the most recent pending trade matching from/to
  const entry = tradeLog.find(e => e.from === trade.from && e.to === trade.to && e.status === 'pending');
  if(entry) {
    entry.status = status;
    renderTradeLog();
    updateTradeLogBadge();
  }
}

function toggleTradeLog() {
  const box = document.getElementById('trade-box');
  tradeLogCollapsed = !tradeLogCollapsed;
  box.classList.toggle('log-collapsed', tradeLogCollapsed);
}

function updateTradeLogBadge() {
  const badge = document.getElementById('trade-log-badge');
  if(!badge) return;
  const pending = tradeLog.filter(e => e.status === 'pending').length;
  if(pending > 0) {
    badge.textContent = pending;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

// =============================================
// TRADING SYSTEM
// =============================================
let tradeState = {
  active: false,
  partnerId: -1,
  myMoney: 0,
  theirMoney: 0,
  myProps: [],      // array of board indices
  theirProps: [],
};
let pendingTrade = null; // incoming trade offer waiting for response

function openTradeModal() {
  if(!gameState || gameState.phase === 'gameOver') return;
  const modal = document.getElementById('trade-modal');

  // Build partner selection screen
  let partnersHtml = '';
  gameState.players.forEach((p, i) => {
    if(i === myPlayerIndex || p.bankrupt) return;
    const propCount = gameState.properties.filter(pr => pr.owner === i).length;
    partnersHtml += `
      <button class="trade-partner-btn" onclick="selectTradePartner(${i})">
        <span class="tp-emoji">${p.emoji}</span>
        <div class="tp-info">
          <div class="tp-name">${p.name}</div>
          <div class="tp-money">${p.money}🍪 · ${propCount} properties</div>
        </div>
      </button>`;
  });

  if(!partnersHtml) {
    partnersHtml = '<div class="trade-empty">No players available to trade with</div>';
  }

  modal.innerHTML = `
    <div class="trade-select-box">
      <h3>Create Trade</h3>
      <div style="color:#a0a0c0;font-size:0.85em;margin-bottom:14px">Choose a player to trade with</div>
      ${partnersHtml}
      <button class="action-btn btn-end" onclick="closeTradeModal()" style="margin-top:12px;width:100%">Cancel</button>
    </div>`;
  modal.classList.add('show');
}

function selectTradePartner(partnerIdx) {
  tradeState = {
    active: true,
    partnerId: partnerIdx,
    myMoney: 0,
    theirMoney: 0,
    myProps: [],
    theirProps: [],
  };
  renderTradeCreation();
}

function renderTradeCreation() {
  const modal = document.getElementById('trade-modal');
  const me = gameState.players[myPlayerIndex];
  const them = gameState.players[tradeState.partnerId];

  // Get properties owned by each
  const myOwnedProps = [];
  const theirOwnedProps = [];
  gameState.properties.forEach((pr, idx) => {
    const cell = BOARD[idx];
    if(!cell || (cell.type !== 'property' && cell.type !== 'railroad' && cell.type !== 'utility')) return;
    if(pr.owner === myPlayerIndex) myOwnedProps.push(idx);
    else if(pr.owner === tradeState.partnerId) theirOwnedProps.push(idx);
  });

  function propCardHtml(idx, side) {
    const cell = BOARD[idx];
    const selected = (side === 'my' ? tradeState.myProps : tradeState.theirProps).includes(idx);
    const colorDot = cell.color ? `<span class="tpc-dot" style="background:${COLORS[cell.color]}"></span>` :
      (cell.type === 'railroad' ? '<span class="tpc-dot" style="background:#666">🚇</span>' : '<span class="tpc-dot" style="background:#999"></span>');
    return `<div class="trade-prop-card ${selected ? 'selected' : ''}" onclick="toggleTradeProperty(${idx},'${side}')">
      ${colorDot} <span>${cell.name}</span> <span class="tpc-price">${cell.price}🍪</span>
    </div>`;
  }

  const myPropsHtml = myOwnedProps.length > 0 ? myOwnedProps.map(i => propCardHtml(i, 'my')).join('') : '<div class="trade-empty">No properties</div>';
  const theirPropsHtml = theirOwnedProps.length > 0 ? theirOwnedProps.map(i => propCardHtml(i, 'their')).join('') : '<div class="trade-empty">No properties</div>';

  modal.innerHTML = `
    <div class="trade-box">
      <div class="trade-header">
        <div class="th-player"><div class="th-emoji">${me.emoji}</div><div class="th-name">${me.name}</div></div>
        <div class="th-arrow">⇄</div>
        <div class="th-player"><div class="th-emoji">${them.emoji}</div><div class="th-name">${them.name}</div></div>
      </div>
      <div class="trade-columns">
        <div class="trade-col">
          <h4>You Offer</h4>
          <div class="trade-money-section">
            <div class="trade-money-label">
              <span>Money</span>
              <span class="trade-money-badge" id="my-money-badge">${tradeState.myMoney}🍪</span>
            </div>
            <input type="range" class="trade-money-slider" min="0" max="${me.money}" value="${tradeState.myMoney}"
              oninput="tradeState.myMoney=parseInt(this.value);document.getElementById('my-money-badge').textContent=this.value+'🍪'">
          </div>
          <h4>Your Properties</h4>
          <div class="trade-props">${myPropsHtml}</div>
        </div>
        <div class="trade-col">
          <h4>You Request</h4>
          <div class="trade-money-section">
            <div class="trade-money-label">
              <span>Money</span>
              <span class="trade-money-badge" id="their-money-badge">${tradeState.theirMoney}🍪</span>
            </div>
            <input type="range" class="trade-money-slider" min="0" max="${them.money}" value="${tradeState.theirMoney}"
              oninput="tradeState.theirMoney=parseInt(this.value);document.getElementById('their-money-badge').textContent=this.value+'🍪'">
          </div>
          <h4>Their Properties</h4>
          <div class="trade-props">${theirPropsHtml}</div>
        </div>
      </div>
      <div class="trade-footer">
        <button class="action-btn btn-end" onclick="closeTradeModal()">Cancel</button>
        <button class="action-btn btn-buy" onclick="sendTradeOffer()">Send Trade</button>
      </div>
    </div>`;
}

function toggleTradeProperty(idx, side) {
  const arr = side === 'my' ? tradeState.myProps : tradeState.theirProps;
  const pos = arr.indexOf(idx);
  if(pos >= 0) arr.splice(pos, 1);
  else arr.push(idx);
  renderTradeCreation();
}

function sendTradeOffer() {
  // Validate: must offer or request something
  if(tradeState.myMoney === 0 && tradeState.theirMoney === 0 && tradeState.myProps.length === 0 && tradeState.theirProps.length === 0) {
    return; // empty trade
  }

  const offer = {
    from: myPlayerIndex,
    to: tradeState.partnerId,
    offerMoney: tradeState.myMoney,
    requestMoney: tradeState.theirMoney,
    offerProps: [...tradeState.myProps],
    requestProps: [...tradeState.theirProps],
  };

  if(isHost) {
    // Host sends trade to the target player
    handleTradeOffer(offer);
  } else {
    // Guest sends trade offer to host for relay
    wsSend({ type:'action', action:'tradeOffer', payload: offer });
  }

  closeTradeModal();
  addTradeToLog(offer, 'pending');
  addLog(`${gameState.players[myPlayerIndex].emoji} ${gameState.players[myPlayerIndex].name} sent a trade offer to ${gameState.players[tradeState.partnerId].emoji} ${gameState.players[tradeState.partnerId].name}`);
  if(isHost) {
    broadcastState();
    renderGame();
  }
}

// Host processes a trade offer and relays it to the target player
function handleTradeOffer(offer) {
  // Store as pending on game state so it syncs
  gameState.pendingTrade = offer;

  // If the target is the host, show it directly
  if(offer.to === myPlayerIndex) {
    showIncomingTrade(offer);
  }

  // Relay to all guests (the target player will show the modal)
  broadcastState();
  wsSend({ type:'tradeIncoming', trade: offer });
}

function showIncomingTrade(offer) {
  if(offer.to !== myPlayerIndex) return;
  pendingTrade = offer;
  // Add to receiving player's trade log
  addTradeToLog(offer, 'pending');

  const from = gameState.players[offer.from];
  const to = gameState.players[offer.to];
  const modal = document.getElementById('trade-modal');

  function propList(indices) {
    if(indices.length === 0) return '<div class="trade-summary-item" style="color:#555">None</div>';
    return indices.map(idx => {
      const cell = BOARD[idx];
      const color = cell.color ? COLORS[cell.color] : '#666';
      return `<div class="trade-summary-item"><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${color};margin-right:6px;vertical-align:middle"></span>${cell.name} (${cell.price}🍪)</div>`;
    }).join('');
  }

  modal.innerHTML = `
    <div class="trade-incoming-box">
      <h3>${from.emoji} ${from.name} wants to trade!</h3>
      <div class="trade-header">
        <div class="th-player"><div class="th-emoji">${from.emoji}</div><div class="th-name">${from.name} offers</div></div>
        <div class="th-arrow">→</div>
        <div class="th-player"><div class="th-emoji">${to.emoji}</div><div class="th-name">${to.name} receives</div></div>
      </div>
      <div class="trade-summary" style="display:flex;gap:0">
        <div style="flex:1;padding:12px;border-right:1px solid #2a3a4a">
          <div class="trade-summary-col">
            <h5>${from.name} gives</h5>
            ${offer.offerMoney > 0 ? `<div class="trade-summary-item" style="color:#f5a623;font-weight:600">${offer.offerMoney}🍪</div>` : ''}
            ${propList(offer.offerProps)}
          </div>
        </div>
        <div style="flex:1;padding:12px">
          <div class="trade-summary-col">
            <h5>${from.name} wants</h5>
            ${offer.requestMoney > 0 ? `<div class="trade-summary-item" style="color:#f5a623;font-weight:600">${offer.requestMoney}🍪</div>` : ''}
            ${propList(offer.requestProps)}
          </div>
        </div>
      </div>
      <div class="trade-footer">
        <button class="action-btn btn-pay" onclick="respondToTrade(false)">Decline</button>
        <button class="action-btn btn-buy" onclick="respondToTrade(true)">Accept</button>
      </div>
    </div>`;
  modal.classList.add('show');
}

function respondToTrade(accept) {
  if(!pendingTrade) return;

  const response = {
    accepted: accept,
    trade: pendingTrade,
  };

  if(isHost) {
    handleTradeResponse(response);
  } else {
    wsSend({ type:'action', action:'tradeResponse', payload: response });
    // Update local trade log for the responding guest
    updateTradeLogStatus(pendingTrade, accept ? 'accepted' : 'declined');
  }

  pendingTrade = null;
  closeTradeModal();
}

// Host executes an accepted trade
function handleTradeResponse(response) {
  const trade = response.trade;
  const from = gameState.players[trade.from];
  const to = gameState.players[trade.to];

  if(response.accepted) {
    // Validate both players can still afford it
    if(from.money < trade.offerMoney || to.money < trade.requestMoney) {
      addLog(`⚠️ Trade failed - insufficient funds`);
      gameState.pendingTrade = null;
      broadcastState();
      renderGame();
      return;
    }

    // Validate ownership hasn't changed
    const offerValid = trade.offerProps.every(idx => gameState.properties[idx].owner === trade.from);
    const requestValid = trade.requestProps.every(idx => gameState.properties[idx].owner === trade.to);
    if(!offerValid || !requestValid) {
      addLog(`⚠️ Trade failed - property ownership changed`);
      gameState.pendingTrade = null;
      broadcastState();
      renderGame();
      return;
    }

    // Execute trade: money
    from.money -= trade.offerMoney;
    to.money += trade.offerMoney;
    to.money -= trade.requestMoney;
    from.money += trade.requestMoney;

    // Execute trade: properties from → to
    trade.offerProps.forEach(idx => {
      gameState.properties[idx].owner = trade.to;
      const fi = from.properties.indexOf(idx);
      if(fi >= 0) from.properties.splice(fi, 1);
      to.properties.push(idx);
    });

    // Execute trade: properties to → from
    trade.requestProps.forEach(idx => {
      gameState.properties[idx].owner = trade.from;
      const ti = to.properties.indexOf(idx);
      if(ti >= 0) to.properties.splice(ti, 1);
      from.properties.push(idx);
    });

    addLog(`✅ Trade completed between ${from.emoji} ${from.name} and ${to.emoji} ${to.name}!`);
    // Update trade log - find pending trade matching this one and mark accepted
    updateTradeLogStatus(trade, 'accepted');
  } else {
    addLog(`❌ ${to.emoji} ${to.name} declined the trade from ${from.emoji} ${from.name}`);
    updateTradeLogStatus(trade, 'declined');
  }

  gameState.pendingTrade = null;
  broadcastState();
  renderGame();
}

function closeTradeModal() {
  const modal = document.getElementById('trade-modal');
  modal.classList.remove('show');
  tradeState.active = false;
}

// =============================================
// HELPERS
// =============================================
// Helper: render a player's color dot as inline HTML
function playerDot(playerOrIdx) {
  const idx = typeof playerOrIdx === 'number' ? playerOrIdx : gameState?.players?.indexOf(playerOrIdx);
  const color = (idx >= 0 && PLAYER_COLORS[idx]) ? PLAYER_COLORS[idx] : '#888';
  return `<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${color};border:1px solid rgba(255,255,255,0.4);vertical-align:middle;margin:0 2px"></span>`;
}

function addLog(msg) {
  if(!gameState.log) gameState.log = [];
  gameState.log.push(msg);
  if(gameState.log.length > 100) gameState.log.shift();
}

// =============================================
// SINGLE PLAYER / LOCAL TEST MODE
// =============================================
// If you want to test alone, uncomment below:
// createLocalGame();
function createLocalGame() {
  isHost = true;
  gameState = createInitialState();
  addPlayerToState('Player 1', PLAYER_COLORS[0]);
  myPlayerIndex = 0;
  const botIdx = addPlayerToState('Bot', PLAYER_COLORS[1]);
  gameState.players[botIdx].isBot = true;
  gameState.phase = 'roll';
  gameState.currentPlayer = 0;
  gameState.message = `Player 1's turn - Roll the dice!`;
  showGameScreen();
}

// Quick start for testing: press T in lobby
document.addEventListener('keydown', (e) => {
  if(e.key === 'T' && document.getElementById('lobby').style.display !== 'none') {
    createLocalGame();
  }
});
